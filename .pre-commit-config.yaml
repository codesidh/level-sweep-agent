# Pre-commit hook configuration for LevelSweepAgent.
# Install once:  pip install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files
# Skip (rare):   git commit --no-verify    (discouraged)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
        # --unsafe lets docker-compose !reset / !override tags through
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Belt-and-suspenders against the never-commit-credentials rule
        # in `trading-system-guardrails`.

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true

  - repo: local
    hooks:
      - id: spotless
        name: Spotless (Java/Kotlin formatting)
        entry: ./gradlew spotlessCheck --no-daemon -q
        language: system
        pass_filenames: false
        types_or: [java, kotlin]
        # Auto-fix locally with: ./gradlew spotlessApply
