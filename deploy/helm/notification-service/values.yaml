# =============================================================================
# Default values for notification-service.
#
# DEPLOYMENT NOTE (Phase 6): this chart deploys the Notification Service
# (architecture-spec §9 — Tier 2 cold; §12.1 — `notifications` Kafka topic).
# Cold-path Spring Boot 3.x service — subscribes to the `notifications` topic
# and dispatches to email (SMTP via JavaMailSender) + SMS (Phase 7 Twilio
# stub). Mongo is the audit-log destination (notifications.outbox); Phase 7
# swaps in managed Cosmos / MongoDB Atlas per architecture-spec §13.2.
#
# Per CLAUDE.md guardrail #8 (scope-gated soak): notification-service is a
# NEW pod, doesn't modify any service currently in active soak (Phase 3+4+6
# journal-service), and can land on main without resetting the soak counter
# on those services. SMTP credentials in production flow via Key Vault
# (mounted as env vars by the chart's CSI provider).
#
# Per-environment overrides are passed via `helm upgrade --install --set ...`
# from .github/workflows/deploy-dev.yml.
# =============================================================================

image:
  # set per env in the deploy workflow, e.g. "<acr>.azurecr.io/notification-service".
  repository: ""
  # overridden per push to the immutable git SHA.
  tag: "latest"
  pullPolicy: IfNotPresent

# Phase 6 single-instance per architecture-spec §16. Multi-replica + leader
# election arrives in Phase 7 once consumer-group rebalance + idempotent
# Mongo writes are stress-tested. The notification service is a cold path
# — single replica is fine for Phase A throughput (≤ 5 trades/day per
# tenant per requirements §11; alerts are bursty but rate-limited at the
# producer side).
replicas: 1

# Deployment strategy. Phase 6 dev is the same 2-node cluster used by
# Phase 1+3+4+6 journal-service; Recreate avoids the RollingUpdate deadlock
# where a second pod can't schedule alongside its predecessor at 512 MiB
# requests.
deployment:
  strategy: Recreate
  maxSurge: 1
  maxUnavailable: 0

service:
  port: 8087
  type: ClusterIP

resources:
  requests:
    # Cold-path Spring Boot — same footprint as journal-service.
    cpu: 200m
    memory: 512Mi
  limits:
    # Memory limit only — no CPU limit per Spring Boot + JDK 21 best practice
    # on K8s (CFS throttling kills GC pause-time tail). HPA wired in Phase 7.
    memory: 1024Mi

# Plain-text application config. Anything secret comes from keyVault.objects.
env:
  TENANT_ID: "OWNER"
  # Kafka via Strimzi (Phase 7 infra/k8s-dev/kafka.yaml). Bootstrap FQDN is
  # the in-cluster Strimzi service. KAFKA_LISTENER_AUTOSTARTUP=true now that
  # the broker is reachable; consumers auto-start on pod boot.
  KAFKA_BOOTSTRAP_SERVERS: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_LISTENER_AUTOSTARTUP: "true"
  # Mongo URL — managed Mongo lands in Phase 7 per architecture-spec §13.2.
  # Until then, in-cluster Mongo (deployed as a separate Helm release) is
  # the dev target.
  MONGO_URL: "mongodb://mongo.mongo.svc.cluster.local:27017/level_sweep"
  MONGO_DB: "level_sweep"
  # Force the Spring profile to `prod` so the test-profile overrides
  # (empty Kafka bootstrap, fake Mongo URI, empty SMTP host) DON'T
  # accidentally activate. The test profile is for unit tests only.
  SPRING_PROFILES_ACTIVE: "prod"
  # OTel service.name — App Insights agent (loaded as -javaagent in
  # Dockerfile.jvm) reads this and stamps it on every trace/log/metric.
  OTEL_SERVICE_NAME: "notification-service"
  # SMTP defaults — empty so EmailDispatcher logs-only when KV mount is
  # absent in dev. Production sets these via the CSI mount below.
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_AUTH: "true"
  SMTP_STARTTLS: "true"
  EMAIL_FROM: "noreply@levelsweep.local"
  EMAIL_TO: ""

# Workload identity binding (Azure AD federated → K8s ServiceAccount).
workloadIdentity:
  enabled: true
  # Per-env: AKS-bound user-assigned MI client id. Phase 6 reuses the kubelet
  # MI; Phase 7 swaps in a dedicated per-service MI federated to this SA.
  clientId: ""

keyVault:
  enabled: true
  # Per-env Azure AD tenant ID.
  tenantId: ""
  # Bare KV name (not URI). Set by the deploy workflow.
  name: ""
  vaultUri: ""
  objects:
    # App Insights connection string — optional in Phase 6 dev (the agent
    # self-disables if unset).
    - name: applicationinsights-connection-string
      type: secret
      env: APPLICATIONINSIGHTS_CONNECTION_STRING
      optional: true
    # SMTP credentials — optional. When unset, EmailDispatcher logs-only.
    # Operator pre-mirrors these once into Key Vault before first
    # production-grade run:
    #   az keyvault secret set --vault-name <KV> --name smtp-username --value "..."
    #   az keyvault secret set --vault-name <KV> --name smtp-password --value "..."
    #   az keyvault secret set --vault-name <KV> --name email-to --value "codesidh@gmail.com"
    - name: smtp-username
      type: secret
      env: SMTP_USERNAME
      optional: true
    - name: smtp-password
      type: secret
      env: SMTP_PASSWORD
      optional: true
    - name: email-to
      type: secret
      env: EMAIL_TO
      optional: true

# Forward-compat keys mirrored from the journal-service / ai-agent-service /
# execution-service chart shape so the deploy-dev.yml --set list can stay
# symmetric across services. Templates ignore these today; a future chart
# bump can wire them in without a workflow edit.
appInsights:
  connectionStringSecretName: applicationinsights-connection-string

mongo:
  urlSecretName: mongo-url

healthCheck:
  liveness:
    # Spring Boot Actuator's K8s liveness probe — distinct from /actuator/health.
    # Liveness fails only on irrecoverable JVM errors (OOM, deadlock). Mongo
    # being unreachable is NOT a liveness failure — it's a readiness one.
    # SMTP being unreachable is NEITHER — see application.yml's
    # management.health.mail.enabled=false.
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    # Readiness includes the MongoHealthIndicator — when Mongo is down, K8s
    # pulls the pod out of Service rotation but does NOT restart it. The
    # Kafka consumer keeps polling and will resume writing once Mongo
    # recovers.
    path: /actuator/health/readiness
    initialDelaySeconds: 5
    periodSeconds: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false

serviceAccount:
  # Auto-derive from chart fullname when name is empty.
  name: ""

# Pod-level security context. Container-level overrides applied in deployment.yaml.
podSecurityContext:
  fsGroup: 100
  runAsNonRoot: true
  runAsUser: 100
