# =============================================================================
# Default values for user-config-service.
#
# DEPLOYMENT NOTE (Phase 6): this chart deploys the User & Config Service
# (architecture-spec §9 cold-path component map; §13.1 MS SQL system of
# record). Cold-path Spring Boot 3.x service — serves CRUD REST over the
# tenant_config MS SQL table (Flyway-managed schema), bootstraps a row for
# the Phase A OWNER tenant on startup, exposes a flags-only read for hot-
# path consumers.
#
# Per CLAUDE.md guardrail #8 (scope-gated soak): user-config-service is a
# NEW pod; it doesn't modify any service currently in active soak (Phase 3
# execution-service or Phase 4 ai-agent-service), doesn't change shared
# infrastructure (no Kafka, no Mongo, no Strimzi config; the MS SQL
# DataSource shape is the same one execution-service already uses for
# eod_flatten_attempts), and any newly exposed runtime path stays default-
# OFF behind feature flags. Lands on main without resetting the soak
# counter on the soaking services.
#
# Per-environment overrides are passed via `helm upgrade --install --set ...`
# from .github/workflows/deploy-dev.yml.
# =============================================================================

image:
  # set per env in the deploy workflow, e.g. "<acr>.azurecr.io/user-config-service".
  repository: ""
  # overridden per push to the immutable git SHA.
  tag: "latest"
  pullPolicy: IfNotPresent

# Phase 6 dev: replicas=0 because MS SQL is not deployed in the dev cluster —
# Flyway crashes the pod on boot trying to acquire a JDBC connection. Phase 7
# provisions Azure SQL (architecture-spec §13.1) and bumps this back to 1.
# Multi-replica + leader election arrives in Phase 7; the cold-path CRUD
# store is fine on a single replica — Phase A throughput is "one PUT per
# config edit" (operator action, not per-trade). Reads are higher volume but
# still small (Decision Engine pulls flags + risk params on each signal eval,
# ~ once per 15-min bar).
replicas: 0

# Deployment strategy. Phase 6 dev is the same 2-node cluster used by
# Phase 1+3+4+6-journal; Recreate avoids the RollingUpdate deadlock where a
# second pod can't schedule alongside its predecessor at 256 MiB requests.
deployment:
  strategy: Recreate
  maxSurge: 1
  maxUnavailable: 0

service:
  port: 8086
  type: ClusterIP

resources:
  requests:
    # Cold-path Spring Boot — half the journal-service request because
    # there's no Kafka listener container, no Mongo client, just a pooled
    # JDBC connection.
    cpu: 100m
    memory: 256Mi
  limits:
    # Memory limit only — no CPU limit per Spring Boot + JDK 21 best practice
    # on K8s (CFS throttling kills GC pause-time tail). HPA wired in Phase 7.
    memory: 512Mi

# Plain-text application config. Anything secret comes from keyVault.objects.
env:
  TENANT_ID: "OWNER"
  # MS SQL connection string. Phase 6 dev points at the in-cluster MS SQL
  # deployment used by execution-service for eod_flatten_attempts; Phase 7
  # swaps in Azure SQL via private endpoint per architecture-spec §13.1.
  # Username / password move to KV-mirrored secrets in Phase 7 once Azure
  # SQL provisions per-service SQL logins.
  MSSQL_URL: "jdbc:sqlserver://mssql:1433;databaseName=level_sweep;encrypt=false"
  MSSQL_USER: "sa"
  # Force the Spring profile to `prod` so the test-profile overrides
  # (fake host, Flyway off) DON'T accidentally activate. The test profile
  # is for unit tests only.
  SPRING_PROFILES_ACTIVE: "prod"
  # OTel service.name — App Insights agent (loaded as -javaagent in
  # Dockerfile.jvm) reads this and stamps it on every trace/log/metric.
  OTEL_SERVICE_NAME: "user-config-service"

# Workload identity binding (Azure AD federated → K8s ServiceAccount).
workloadIdentity:
  enabled: true
  # Per-env: AKS-bound user-assigned MI client id. Phase 6 reuses the kubelet
  # MI; Phase 7 swaps in a dedicated per-service MI federated to this SA.
  clientId: ""

keyVault:
  enabled: true
  # Per-env Azure AD tenant ID.
  tenantId: ""
  # Bare KV name (not URI). Set by the deploy workflow.
  name: ""
  vaultUri: ""
  objects:
    # App Insights connection string — optional in Phase 6 dev (the agent
    # self-disables if unset).
    - name: applicationinsights-connection-string
      type: secret
      env: APPLICATIONINSIGHTS_CONNECTION_STRING
      optional: true
    # MS SQL password mirrored from the cluster secret. Phase 6 dev uses
    # the seeded `LevelSweep!2026` SA password; Phase 7 swaps in Azure SQL
    # AAD authentication (no password in KV at all).
    - name: mssql-password
      type: secret
      env: MSSQL_PASSWORD
      optional: true

# Forward-compat keys mirrored from the journal-service / ai-agent-service /
# execution-service chart shape so the deploy-dev.yml --set list can stay
# symmetric across services. Templates ignore these today; a future chart
# bump can wire them in without a workflow edit.
appInsights:
  connectionStringSecretName: applicationinsights-connection-string

mssql:
  passwordSecretName: mssql-password

healthCheck:
  liveness:
    # Spring Boot Actuator's K8s liveness probe — distinct from
    # /actuator/health. Liveness fails only on irrecoverable JVM errors
    # (OOM, deadlock). MS SQL being unreachable is NOT a liveness failure
    # — it's a readiness one.
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    # Readiness includes the DataSourceHealthIndicator — when MS SQL is
    # down, K8s pulls the pod out of Service rotation but does NOT restart
    # it. The pod resumes serving once MS SQL recovers.
    path: /actuator/health/readiness
    initialDelaySeconds: 5
    periodSeconds: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

serviceAccount:
  # Auto-derive from chart fullname when name is empty.
  name: ""

# Pod-level security context. Container-level overrides applied in deployment.yaml.
podSecurityContext:
  fsGroup: 100
  runAsNonRoot: true
  runAsUser: 100
