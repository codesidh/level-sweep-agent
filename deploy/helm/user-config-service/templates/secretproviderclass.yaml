{{- if .Values.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "user-config-service.fullname" . }}-kv
  labels:
    {{- include "user-config-service.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    # Workload identity (federation) — see serviceaccount.yaml. The CSI driver
    # exchanges the SA's projected token for an Azure AD access token and
    # reads KV with that. Pod identity / VM MSI are deprecated.
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    cloudName: ""
    objects: |
      array:
        {{- range .Values.keyVault.objects }}
        - |
          objectName: {{ .name }}
          objectType: {{ .type }}
        {{- end }}
  # Sync each KV secret into a native K8s Secret so the Deployment can wire
  # them into env vars via secretKeyRef. Without `secretObjects`, only the
  # tmpfs CSI mount is created and env injection is impossible.
  secretObjects:
    {{- range .Values.keyVault.objects }}
    - secretName: {{ printf "%s-%s" (include "user-config-service.fullname" $) .name | trunc 63 | trimSuffix "-" }}
      type: Opaque
      data:
        - objectName: {{ .name }}
          key: {{ .name }}
    {{- end }}
{{- end }}
