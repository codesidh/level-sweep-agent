{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# Phase 6 NetworkPolicy. Mirrors the journal-service / ai-agent-service /
# execution-service pattern — permissive but non-zero. Phase 7 tightens
# egress to specific FQDNs / Azure service tags and ingress to the BFF SA
# only.
#
# Ingress: HTTP from anywhere in the same namespace. The primary clients
# are (a) the BFF / api-gateway (operator REST CRUD on PUT /config/{tenantId})
# and (b) the Decision Engine + Execution Service hot paths (GET
# /config/{tenantId}/feature-flags on signal-eval). Phase 7 narrows this to
# `from.podSelector` for those specific service SAs once they're deployed.
#
# Egress:
#   - DNS to kube-system (kube-dns)
#   - HTTPS anywhere (App Insights ingest, KV CSI driver)
#   - Same-ns MS SQL on 1433 — the dev MS SQL deployment lives in this
#     same namespace in Phase 6/7.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "user-config-service.fullname" . }}
  labels:
    {{- include "user-config-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "user-config-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # DNS — kube-dns lives in kube-system.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS to anywhere — KV CSI driver, App Insights ingest. Phase 7
    # tightens this to a per-FQDN allowlist.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # MS SQL on the intra-cluster service port — the dev MS SQL deployment
    # lives in this same namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: 1433
          protocol: TCP
{{- end }}
