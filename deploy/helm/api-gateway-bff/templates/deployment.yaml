apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-gateway-bff.fullname" . }}
  labels:
    {{- include "api-gateway-bff.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "api-gateway-bff.selectorLabels" . | nindent 6 }}
  strategy:
    # Phase 6 dev: the same 2-node, single-replica-per-service cluster used
    # by Phase 1+3+4+6-* services. RollingUpdate would create a second pod
    # (maxSurge=1) before terminating the old one, but the dev cluster is
    # sized for one pod per service per node — Recreate kills the old pod
    # first → ~10s downtime → no resource contention. Phase 7 production
    # scales to 3+ nodes and switches back to RollingUpdate (which also
    # requires moving the rate limiter off the in-process bucket map).
    type: {{ .Values.deployment.strategy | default "Recreate" }}
    {{- if eq (.Values.deployment.strategy | default "Recreate") "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.deployment.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.deployment.maxUnavailable | default 0 }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "api-gateway-bff.selectorLabels" . | nindent 8 }}
        {{- if .Values.workloadIdentity.enabled }}
        # Required for the Azure Workload Identity webhook to inject the
        # projected SA token + AZURE_* env into the pod.
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ include "api-gateway-bff.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api-gateway-bff
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.keyVault.enabled }}
            {{- range .Values.keyVault.objects }}
            {{- if .env }}
            - name: {{ .env }}
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-%s" (include "api-gateway-bff.fullname" $) .name | trunc 63 | trimSuffix "-" }}
                  key: {{ .name }}
                  optional: {{ default false .optional }}
            {{- end }}
            {{- end }}
            {{- end }}
          volumeMounts:
            # Spring Boot needs a writable scratch dir; readOnlyRootFilesystem
            # blocks /tmp by default.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.keyVault.enabled }}
            - name: kv-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
            {{- with .Values.healthCheck.liveness.failureThreshold }}
            failureThreshold: {{ . }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
            {{- with .Values.healthCheck.readiness.failureThreshold }}
            failureThreshold: {{ . }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.keyVault.enabled }}
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "api-gateway-bff.fullname" . }}-kv
        {{- end }}
