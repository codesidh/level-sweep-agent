{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# Phase 6 NetworkPolicy. Mirrors the journal-service / user-config-service
# pattern — permissive but non-zero. Phase 7 tightens egress to specific
# in-cluster service FQDNs and ingress to APIM only.
#
# Ingress: HTTP from anywhere (the BFF is the public ingress for the
# Angular dashboard). Phase 7 narrows to the APIM SA / AKS load balancer.
#
# Egress:
#   - DNS to kube-system (kube-dns)
#   - HTTPS anywhere (App Insights ingest, KV CSI driver)
#   - HTTP to the four downstream service ports across their respective
#     namespaces. The BFF needs to reach journal (8085), user-config (8086),
#     projection (8087), calendar (8088). Phase 7 tightens this to specific
#     namespaceSelectors per service.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "api-gateway-bff.fullname" . }}
  labels:
    {{- include "api-gateway-bff.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "api-gateway-bff.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from any pod in the cluster — the dashboard hits the
    # BFF via the K8s LoadBalancer Service in Phase 6 dev. Phase 7 narrows
    # to APIM only.
    - {}
  egress:
    # DNS — kube-dns lives in kube-system.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS to anywhere — KV CSI driver, App Insights ingest. Phase 7
    # tightens this to a per-FQDN allowlist.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # HTTP to downstream cold-path services across their dedicated
    # namespaces. Phase 6 deploys each cold-path service into its own
    # namespace (deploy-dev.yml `--namespace journal-service` etc.) so
    # the egress allowlist needs to span them. Phase 7 narrows per
    # namespace + per service-account.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: journal-service
      ports:
        - port: 8085
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: user-config-service
      ports:
        - port: 8086
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: projection-service
      ports:
        - port: 8087
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: calendar-service
      ports:
        - port: 8088
          protocol: TCP
{{- end }}
