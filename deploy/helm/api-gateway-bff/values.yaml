# =============================================================================
# Default values for api-gateway-bff.
#
# DEPLOYMENT NOTE (Phase 6): this chart deploys the API Gateway / BFF
# (architecture-spec §9 Tier 2 edge component, §16.4 auth flow). Edge
# Spring Boot 3.x service — single ingress for the Angular dashboard;
# Phase A authn is the X-Tenant-Id bypass header (Phase B Auth0 JWT behind
# feature flag); routes proxy to journal-service, user-config-service,
# projection-service, calendar-service.
#
# Per CLAUDE.md guardrail #8 (scope-gated soak): api-gateway-bff is a
# NEW pod; it doesn't modify any service currently in active soak (Phase
# 3 execution-service, Phase 4 ai-agent-service), doesn't change shared
# infrastructure (no Kafka, no Mongo, no MS SQL, no Strimzi config), and
# any newly exposed runtime path stays default-OFF behind feature flags
# (phase-b-jwt-auth=false at minimum). Lands on main without resetting
# the soak counter on the soaking services.
#
# Per-environment overrides are passed via `helm upgrade --install --set ...`
# from .github/workflows/deploy-dev.yml.
# =============================================================================

image:
  # set per env in the deploy workflow, e.g. "<acr>.azurecr.io/api-gateway-bff".
  repository: ""
  # overridden per push to the immutable git SHA.
  tag: "latest"
  pullPolicy: IfNotPresent

# Phase 6 single-instance per architecture-spec §16. Multi-replica + sticky
# session (or external bucket store for the rate limiter) arrives in Phase 7;
# the BFF is fine on a single replica — Phase A throughput is "operator hits
# the dashboard a few times a minute". The in-process bucket4j map only works
# correctly with one pod (otherwise a tenant's quota is split across replicas,
# which lets a noisy tenant blow past 100 req/min).
replicas: 1

# Deployment strategy. Phase 6 dev is the same 2-node cluster used by
# Phase 1+3+4+6-* services; Recreate avoids the RollingUpdate deadlock where
# a second pod can't schedule alongside its predecessor at the configured
# requests.
deployment:
  strategy: Recreate
  maxSurge: 1
  maxUnavailable: 0

service:
  port: 8090
  type: ClusterIP

resources:
  requests:
    # Edge service — the BFF does no DB work; just RestClient fan-out and
    # bucket4j arithmetic. Same footprint as user-config-service.
    cpu: 100m
    memory: 256Mi
  limits:
    # Memory limit only — no CPU limit per Spring Boot + JDK 21 best practice
    # on K8s (CFS throttling kills GC pause-time tail). HPA wired in Phase 7
    # once we're past the 1-replica constraint of the in-process limiter.
    memory: 512Mi

# Plain-text application config. Anything secret comes from keyVault.objects.
env:
  TENANT_ID: "OWNER"
  # Force the Spring profile to `prod` so the test-profile overrides
  # (fake host downstreams) DON'T accidentally activate. The test profile
  # is for unit tests only.
  SPRING_PROFILES_ACTIVE: "prod"
  # Downstream service URLs — service DNS inside AKS. Each cold-path service
  # lives in its own namespace per the deploy-dev.yml topology (so a failed
  # deploy of one doesn't block the others).
  JOURNAL_SERVICE_URL: "http://journal-service.journal-service.svc.cluster.local:8085"
  USER_CONFIG_SERVICE_URL: "http://user-config-service.user-config-service.svc.cluster.local:8086"
  PROJECTION_SERVICE_URL: "http://projection-service.projection-service.svc.cluster.local:8087"
  CALENDAR_SERVICE_URL: "http://calendar-service.calendar-service.svc.cluster.local:8088"
  # OTel service.name — App Insights agent (loaded as -javaagent in
  # Dockerfile.jvm) reads this and stamps it on every trace/log/metric.
  OTEL_SERVICE_NAME: "api-gateway-bff"

# Workload identity binding (Azure AD federated → K8s ServiceAccount).
workloadIdentity:
  enabled: true
  # Per-env: AKS-bound user-assigned MI client id. Phase 6 reuses the kubelet
  # MI; Phase 7 swaps in a dedicated per-service MI federated to this SA.
  clientId: ""

keyVault:
  enabled: true
  # Per-env Azure AD tenant ID.
  tenantId: ""
  # Bare KV name (not URI). Set by the deploy workflow.
  name: ""
  vaultUri: ""
  objects:
    # App Insights connection string — optional in Phase 6 dev (the agent
    # self-disables if unset).
    - name: applicationinsights-connection-string
      type: secret
      env: APPLICATIONINSIGHTS_CONNECTION_STRING
      optional: true

# Forward-compat key mirrored from the journal-service / user-config-service
# / notification-service chart shape so the deploy-dev.yml --set list stays
# symmetric across services. Templates ignore this today; a future chart
# bump can wire it without a workflow edit.
appInsights:
  connectionStringSecretName: applicationinsights-connection-string

healthCheck:
  liveness:
    # Spring Boot Actuator's K8s liveness probe — distinct from
    # /actuator/health. Liveness fails only on irrecoverable JVM errors
    # (OOM, deadlock). A downstream being unreachable is NOT a liveness
    # failure — the BFF gracefully degrades the dashboard summary.
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    # Readiness intentionally does NOT include downstream probes — the BFF
    # is ready as soon as Spring Boot is up. Downstream availability is
    # handled per-call (timeout + degraded marker).
    path: /actuator/health/readiness
    initialDelaySeconds: 5
    periodSeconds: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

serviceAccount:
  # Auto-derive from chart fullname when name is empty.
  name: ""

# Pod-level security context. Container-level overrides applied in deployment.yaml.
podSecurityContext:
  fsGroup: 100
  runAsNonRoot: true
  runAsUser: 100
