apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "journal-service.serviceAccountName" . }}
  labels:
    {{- include "journal-service.labels" . | nindent 4 }}
  {{- if and .Values.workloadIdentity.enabled .Values.workloadIdentity.clientId }}
  annotations:
    # Azure AD Workload Identity binding — pods using this SA receive a
    # federated token for the user-assigned MI with this client id. Federated
    # credential is created by infra/environments/dev/main.tf →
    # azurerm_federated_identity_credential.journal_service_sa with subject
    # `system:serviceaccount:journal-service:journal-service`.
    azure.workload.identity/client-id: {{ .Values.workloadIdentity.clientId | quote }}
    azure.workload.identity/tenant-id: {{ .Values.keyVault.tenantId | quote }}
  {{- end }}
