{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# Phase 6 NetworkPolicy. Mirrors the journal-service / ai-agent-service /
# execution-service pattern — permissive but non-zero. Phase 7 tightens egress
# to specific FQDNs / Azure service tags and ingress to the BFF SA only.
#
# Ingress: HTTP from anywhere in the same namespace. The primary client is
# the BFF / api-gateway (operator REST POST /projection/run + GET
# /projection/last/{tenantId} from the dashboard's Projection panel). Phase 7
# narrows this to `from.podSelector` for that specific service SA once it's
# deployed.
#
# Egress:
#   - DNS to kube-system (kube-dns)
#   - HTTPS anywhere (App Insights ingest, KV CSI driver)
#   - Same-ns Mongo (27017) — the dev Mongo deployment lives in this same
#     namespace in Phase 6/7.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "projection-service.fullname" . }}
  labels:
    {{- include "projection-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "projection-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # DNS — kube-dns lives in kube-system.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS to anywhere — KV CSI driver, App Insights ingest. Phase 7
    # tightens this to a per-FQDN allowlist.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # Mongo on the intra-cluster service port — the dev Mongo deployment
    # lives in this same namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: 27017
          protocol: TCP
{{- end }}
