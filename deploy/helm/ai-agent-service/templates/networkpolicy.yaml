{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# Phase 4 NetworkPolicy. Permissive but non-zero: deny everything except
# (a) ingress from the same namespace to the HTTP port, (b) egress to DNS,
# (c) egress to 443 anywhere — covers Anthropic Messages API
# (api.anthropic.com:443), KV CSI driver, App Insights ingest, and the
# managed Mongo TLS endpoint when Phase 7 lands. Phase 7 tightens egress
# to specific FQDNs / Azure service tags via Cilium netpol or AKS-managed
# NPM (FQDN allowlist: api.anthropic.com).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-agent-service.fullname" . }}
  labels:
    {{- include "ai-agent-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-agent-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # DNS — kube-dns lives in kube-system.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS to anywhere — Anthropic Messages API (api.anthropic.com), KV CSI
    # driver, App Insights ingest. Phase 7 tightens this to a per-FQDN
    # allowlist.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # Kafka brokers + Mongo on intra-cluster service ports — the Phase 6
    # Strimzi cluster lives in this same namespace, so allow same-ns
    # egress on the relevant ports without overcommitting the policy.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: 9092
          protocol: TCP
        - port: 27017
          protocol: TCP
{{- end }}
