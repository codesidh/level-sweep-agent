{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# Phase 7 NetworkPolicy. Permissive but non-zero: deny everything except
# (a) ingress from the same namespace to the HTTP port, (b) egress to DNS,
# (c) egress to 443 anywhere — covers KV CSI driver, App Insights ingest,
# and (when LEVELSWEEP_SENTINEL_ENABLED flips ON) the in-cluster
# ai-agent-service Sentinel REST hop, (d) intra-cluster Kafka brokers,
# Mongo, MS SQL on their service ports.
#
# Phase 7 later sub-steps tighten egress to specific FQDNs / Azure service
# tags via Cilium netpol or AKS-managed NPM.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "decision-engine.fullname" . }}
  labels:
    {{- include "decision-engine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "decision-engine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # DNS — kube-dns lives in kube-system.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS to anywhere — KV CSI driver, App Insights ingest. Phase 7 later
    # sub-steps tighten this to a per-FQDN allowlist.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # In-cluster ai-agent-service for the Sentinel veto REST hop. Lives in
    # namespace `ai-agent`. Egress is gated only when
    # LEVELSWEEP_SENTINEL_ENABLED flips ON; the policy keeps the path open
    # so the saga doesn't see a network-level block on first activation.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-agent
      ports:
        - port: 8084
          protocol: TCP
    # Kafka brokers + Mongo + MS SQL on intra-cluster service ports — the
    # Phase 6 Strimzi cluster lives in this same namespace, so allow same-ns
    # egress on the relevant ports without overcommitting the policy. The
    # `kafka` namespace is kept open separately so a Strimzi cluster in a
    # dedicated namespace also resolves.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: 9092
          protocol: TCP
        - port: 27017
          protocol: TCP
        - port: 1433
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka
      ports:
        - port: 9092
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mongo
      ports:
        - port: 27017
          protocol: TCP
{{- end }}
