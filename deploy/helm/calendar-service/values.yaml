# =============================================================================
# Default values for calendar-service.
#
# DEPLOYMENT NOTE (Phase 6): this chart deploys the Calendar Service
# (architecture-spec §9). Cold-path Spring Boot 3.x service — pure stateless
# reference-data lookup; no Mongo, no Kafka, no MS SQL, no per-pod state.
# The whole dataset (NYSE holidays + FOMC dates 2026-2030) is loaded from
# YAML resources at startup.
#
# Per CLAUDE.md guardrail #8 (scope-gated soak): calendar-service is a NEW
# pod, doesn't modify any service currently in active soak (Phase 3+4+6
# journal), and can land on main without resetting the soak counter on those
# services. Phase 1 alert KQL "holiday calendar not modeled — fires on US
# market holidays" is closed by this PR's deployment.
#
# Per-environment overrides are passed via `helm upgrade --install --set ...`
# from .github/workflows/deploy-dev.yml.
# =============================================================================

image:
  # set per env in the deploy workflow, e.g. "<acr>.azurecr.io/calendar-service".
  repository: ""
  # overridden per push to the immutable git SHA.
  tag: "latest"
  pullPolicy: IfNotPresent

# Phase 6 single-instance per architecture-spec §16. The calendar is fully
# in-memory + stateless, so a multi-replica config would just trade a
# vanishingly-small uptime gain for double the resource use. Phase 7 may add
# a 2nd replica for HA once the service is wired into the Session FSM hot
# path.
replicas: 1

# Deployment strategy. Phase 6 dev is the same 2-node cluster used by
# Phase 1+3+4+6/journal; Recreate avoids the RollingUpdate deadlock where a
# second pod can't schedule alongside its predecessor at constrained
# requests. Calendar's footprint is tiny (256 MiB) so RollingUpdate would
# work, but mirroring the other charts' Recreate strategy keeps the
# operator's mental model consistent.
deployment:
  strategy: Recreate
  maxSurge: 1
  maxUnavailable: 0

service:
  port: 8088
  type: ClusterIP

resources:
  requests:
    # Cold-path Spring Boot — lightest of the cold-path services, no Kafka
    # listener container, no Mongo connection pool. 100m CPU / 256 MiB
    # covers Spring context + Tomcat thread pool + the loaded calendar.
    cpu: 100m
    memory: 256Mi
  limits:
    # Memory limit only — no CPU limit per Spring Boot + JDK 21 best practice
    # on K8s (CFS throttling kills GC pause-time tail). The dataset is
    # immutable + < 100 KiB so heap pressure is non-existent.
    memory: 512Mi

# Plain-text application config. No secrets — the calendar has no
# credentials, no API keys, no encrypted payload.
env:
  TENANT_ID: "OWNER"
  # Force the Spring profile to `prod` so any test-profile overrides DON'T
  # accidentally activate. Calendar service has no per-profile branches
  # today but the convention is set chart-wide for consistency.
  SPRING_PROFILES_ACTIVE: "prod"
  # OTel service.name — App Insights agent (loaded as -javaagent in
  # Dockerfile.jvm) reads this and stamps it on every trace/log/metric.
  OTEL_SERVICE_NAME: "calendar-service"

# Workload identity binding (Azure AD federated → K8s ServiceAccount).
# The calendar has NO Key Vault objects to mount today — it's read-only,
# stateless, no secrets — but we still wire workload identity so future
# integrations (Phase 7 economic-calendar API key, if/when adopted) plug in
# without a chart redesign.
workloadIdentity:
  enabled: true
  # Per-env: AKS-bound user-assigned MI client id. Phase 6 reuses the kubelet
  # MI; Phase 7 swaps in a dedicated per-service MI federated to this SA.
  clientId: ""

# keyVault is intentionally DISABLED here. The calendar has no secrets to
# mount — adding the CSI driver + SecretProviderClass + synced K8s Secret
# objects would just add latency to the pod's first Ready signal for zero
# benefit. Phase 7 may flip this on if/when an external economic-calendar
# API key lands.
keyVault:
  enabled: false
  tenantId: ""
  name: ""
  vaultUri: ""
  objects: []

healthCheck:
  liveness:
    # Spring Boot Actuator's K8s liveness probe — distinct from /actuator/health.
    # Liveness fails only on irrecoverable JVM errors (OOM, deadlock).
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    # Readiness flips green once the @PostConstruct calendar load completes
    # successfully; if the YAML files are missing or malformed the Spring
    # context fails to refresh and the pod never reaches Ready (intentional
    # — see CalendarService loadCalendar() class header).
    path: /actuator/health/readiness
    initialDelaySeconds: 5
    periodSeconds: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false

serviceAccount:
  # Auto-derive from chart fullname when name is empty.
  name: ""

# Pod-level security context. Container-level overrides applied in deployment.yaml.
podSecurityContext:
  fsGroup: 100
  runAsNonRoot: true
  runAsUser: 100
