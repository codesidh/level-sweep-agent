# =============================================================================
# Main pipeline — runs on push to main.
# Per architecture-spec §19.1: build native images (Phase 7+; today JVM jars),
# integration tests, container scan (Trivy), push to GHCR.
# =============================================================================
name: main

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "adr/**"
      - "infra/**"
      - ".claude/**"
      - "references/**"
      - "deploy/helm/**"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (e.g., 're-build image after infra-only change')."
        required: false
        type: string
        default: "manual rebuild"

permissions:
  contents: read
  packages: write
  id-token: write   # OIDC for Azure (Phase 7+)

concurrency:
  group: main
  cancel-in-progress: false   # Never cancel a main build mid-flight.

jobs:

  build:
    name: build + integration
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to 8.10.2 to match the wrapper. Quarkus 3.15.1 plugin is not
          # yet compatible with Gradle 9.x (detachedConfiguration extension).
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # Apply (auto-fix) — main.yml runs after merge, so any drift is from
      # broken pre-commit hygiene. Run apply, then fail if anything changed
      # so the offending PR author / commit is identified.
      - name: Spotless apply (Palantir Java + ktlint)
        run: ./gradlew spotlessApply --stacktrace

      - name: Fail if source files were not pre-formatted
        # Exclude wrapper artifacts (regenerated by 'gradle wrapper' step).
        run: |
          if ! git diff --exit-code -- ':!gradlew' ':!gradlew.bat' ':!gradle/wrapper/'; then
            echo "::error::Spotless rewrote files on main. Investigate the previous PR for missing pre-commit hooks."
            exit 1
          fi

      - name: Build all modules
        run: ./gradlew build --stacktrace

      - name: Integration tests (docker-compose dependencies)
        run: ./gradlew integrationTest --stacktrace

      - name: Replay parity (Decision Engine)
        run: ./gradlew replayTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

  # ---------------------------------------------------------------------------
  # Container build + Trivy scan + push to GHCR (Phase 1: market-data-service).
  # S7 will (a) push to ACR alongside GHCR via Azure OIDC, (b) add AKS deploy.
  # Native-image swap is Phase 7 per architecture-spec §15.
  # ---------------------------------------------------------------------------
  containers:
    name: containers (market-data-service)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write    # OIDC for `azure/login` so we can push to ACR.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to 8.10.2 to match the wrapper. Quarkus 3.15.1 plugin is not
          # yet compatible with Gradle 9.x.
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # quarkusBuild produces the fast-jar layout under build/quarkus-app/
      # without re-running the test suite (already covered by the `build` job).
      - name: Assemble market-data-service fast-jar
        run: ./gradlew :services:market-data-service:quarkusBuild --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Azure OIDC + ACR login. Gated on main-branch (push or workflow_dispatch)
      # so PRs from forks — which don't have OIDC secret access — don't fail.
      # Also skipped when ACR_LOGIN_SERVER is unset, so the workflow stays
      # GHCR-only until the operator wires the dev environment secrets.
      - name: Azure login (OIDC)
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_LOGIN_SERVER != ''
        uses: azure/login@v2
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_NAME != ''
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: az acr login --name "${ACR_NAME}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          GHCR_BASE="ghcr.io/${OWNER}/${REPO}/market-data-service"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_sha=${GHCR_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${GHCR_BASE}:latest" >> "$GITHUB_OUTPUT"
          # Build a multi-line tag list. ACR tags are conditional on the
          # ACR_LOGIN_SERVER secret being set.
          {
            echo "all_tags<<EOF"
            echo "${GHCR_BASE}:${GITHUB_SHA}"
            echo "${GHCR_BASE}:latest"
            if [ -n "${ACR_LOGIN_SERVER}" ]; then
              echo "${ACR_LOGIN_SERVER}/market-data-service:${GITHUB_SHA}"
              echo "${ACR_LOGIN_SERVER}/market-data-service:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: services/market-data-service
          file: services/market-data-service/src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.tags.outputs.all_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.ghcr_sha }}
          severity: HIGH,CRITICAL
          exit-code: 0   # Phase 1: report only. Phase 7 flips to 1.
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Container build + Trivy scan + push (Phase 3: execution-service). Mirrors
  # the market-data-service container job — same OIDC + ACR + GHCR + Buildx
  # flow, gated per-service by dorny/paths-filter so docs / market-data-only
  # changes don't rebuild this image. Native-image swap is Phase 7 per
  # architecture-spec §15.
  # ---------------------------------------------------------------------------
  containers-execution-service:
    name: containers (execution-service)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write    # OIDC for `azure/login` so we can push to ACR.
    steps:
      - uses: actions/checkout@v4

      # Per-service paths filter — skip the rest of the job when the push
      # didn't touch execution-service / shared / gradle. Mirrors the
      # dorny/paths-filter pattern used in pr.yml.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            execution:
              - 'services/execution-service/**'
              - 'shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '**/*.gradle.kts'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/main.yml'
              - 'deploy/helm/execution-service/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to 8.10.2 to match the wrapper. Quarkus 3.15.1 plugin is not
          # yet compatible with Gradle 9.x.
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # quarkusBuild produces the fast-jar layout under build/quarkus-app/
      # without re-running the test suite (already covered by the `build` job).
      - name: Assemble execution-service fast-jar
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        run: ./gradlew :services:execution-service:quarkusBuild --no-daemon

      - name: Log in to GHCR
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Azure OIDC + ACR login. Gated on main-branch (push or workflow_dispatch)
      # so PRs from forks — which don't have OIDC secret access — don't fail.
      # Also skipped when ACR_LOGIN_SERVER is unset, so the workflow stays
      # GHCR-only until the operator wires the dev environment secrets.
      - name: Azure login (OIDC)
        if: (steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_LOGIN_SERVER != ''
        uses: azure/login@v2
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: (steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_NAME != ''
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: az acr login --name "${ACR_NAME}"

      - name: Set up Buildx
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        id: tags
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          GHCR_BASE="ghcr.io/${OWNER}/${REPO}/execution-service"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_sha=${GHCR_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${GHCR_BASE}:latest" >> "$GITHUB_OUTPUT"
          # Build a multi-line tag list. ACR tags are conditional on the
          # ACR_LOGIN_SERVER secret being set.
          {
            echo "all_tags<<EOF"
            echo "${GHCR_BASE}:${GITHUB_SHA}"
            echo "${GHCR_BASE}:latest"
            if [ -n "${ACR_LOGIN_SERVER}" ]; then
              echo "${ACR_LOGIN_SERVER}/execution-service:${GITHUB_SHA}"
              echo "${ACR_LOGIN_SERVER}/execution-service:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push image
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: services/execution-service
          file: services/execution-service/src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.tags.outputs.all_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan image
        if: steps.filter.outputs.execution == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.ghcr_sha }}
          severity: HIGH,CRITICAL
          exit-code: 0   # Phase 3: report only. Phase 7 flips to 1.
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Container build + Trivy scan + push (Phase 4: ai-agent-service). Mirrors
  # the execution-service container job — same OIDC + ACR + GHCR + Buildx
  # flow, gated per-service by dorny/paths-filter so docs / market-data-only
  # / execution-only changes don't rebuild this image. Native-image swap is
  # Phase 7 per architecture-spec §15.
  # ---------------------------------------------------------------------------
  containers-ai-agent-service:
    name: containers (ai-agent-service)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write    # OIDC for `azure/login` so we can push to ACR.
    steps:
      - uses: actions/checkout@v4

      # Per-service paths filter — skip the rest of the job when the push
      # didn't touch ai-agent-service / shared / gradle. Mirrors the
      # dorny/paths-filter pattern used in pr.yml.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ai_agent:
              - 'services/ai-agent-service/**'
              - 'shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '**/*.gradle.kts'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/main.yml'
              - 'deploy/helm/ai-agent-service/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to 8.10.2 to match the wrapper. Quarkus 3.15.1 plugin is not
          # yet compatible with Gradle 9.x.
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # quarkusBuild produces the fast-jar layout under build/quarkus-app/
      # without re-running the test suite (already covered by the `build` job).
      - name: Assemble ai-agent-service fast-jar
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        run: ./gradlew :services:ai-agent-service:quarkusBuild --no-daemon

      - name: Log in to GHCR
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Azure OIDC + ACR login. Gated on main-branch (push or workflow_dispatch)
      # so PRs from forks — which don't have OIDC secret access — don't fail.
      # Also skipped when ACR_LOGIN_SERVER is unset, so the workflow stays
      # GHCR-only until the operator wires the dev environment secrets.
      - name: Azure login (OIDC)
        if: (steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_LOGIN_SERVER != ''
        uses: azure/login@v2
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: (steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_NAME != ''
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: az acr login --name "${ACR_NAME}"

      - name: Set up Buildx
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        id: tags
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          GHCR_BASE="ghcr.io/${OWNER}/${REPO}/ai-agent-service"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_sha=${GHCR_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${GHCR_BASE}:latest" >> "$GITHUB_OUTPUT"
          # Build a multi-line tag list. ACR tags are conditional on the
          # ACR_LOGIN_SERVER secret being set.
          {
            echo "all_tags<<EOF"
            echo "${GHCR_BASE}:${GITHUB_SHA}"
            echo "${GHCR_BASE}:latest"
            if [ -n "${ACR_LOGIN_SERVER}" ]; then
              echo "${ACR_LOGIN_SERVER}/ai-agent-service:${GITHUB_SHA}"
              echo "${ACR_LOGIN_SERVER}/ai-agent-service:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push image
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: services/ai-agent-service
          file: services/ai-agent-service/src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.tags.outputs.all_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan image
        if: steps.filter.outputs.ai_agent == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.ghcr_sha }}
          severity: HIGH,CRITICAL
          exit-code: 0   # Phase 4: report only. Phase 7 flips to 1.
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Container build + Trivy scan + push (Phase 6: journal-service). Mirrors
  # the ai-agent-service container job — same OIDC + ACR + GHCR + Buildx
  # flow, gated per-service by dorny/paths-filter so changes that don't
  # touch journal-service don't rebuild this image. Native-image is NOT on
  # the Phase 7 plan for cold-path Spring Boot — the fat-jar Dockerfile is
  # the steady state.
  #
  # Build difference vs. the Quarkus services: this job invokes :bootJar
  # (Spring Boot Gradle plugin) instead of :quarkusBuild. The output lands
  # at build/libs/journal-service-*.jar, which Dockerfile.jvm COPYs in
  # directly — no fast-jar layout, no quarkus-run.jar wrapper.
  # ---------------------------------------------------------------------------
  containers-journal-service:
    name: containers (journal-service)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write    # OIDC for `azure/login` so we can push to ACR.
    steps:
      - uses: actions/checkout@v4

      # Per-service paths filter — skip the rest of the job when the push
      # didn't touch journal-service / shared / gradle. Mirrors the
      # dorny/paths-filter pattern used for the other container jobs.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            journal:
              - 'services/journal-service/**'
              - 'shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '**/*.gradle.kts'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/main.yml'
              - 'deploy/helm/journal-service/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to 8.10.2 to match the wrapper. Quarkus 3.15.1 plugin is not
          # yet compatible with Gradle 9.x — the build is monorepo so even
          # cold-path Spring Boot services share the wrapper version.
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # bootJar produces the Spring Boot fat jar under build/libs/ without
      # re-running the test suite (already covered by the `build` job).
      - name: Assemble journal-service fat-jar
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        run: ./gradlew :services:journal-service:bootJar --no-daemon

      - name: Log in to GHCR
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Azure OIDC + ACR login. Gated on main-branch (push or workflow_dispatch)
      # so PRs from forks — which don't have OIDC secret access — don't fail.
      - name: Azure login (OIDC)
        if: (steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_LOGIN_SERVER != ''
        uses: azure/login@v2
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: (steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_NAME != ''
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: az acr login --name "${ACR_NAME}"

      - name: Set up Buildx
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        id: tags
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          GHCR_BASE="ghcr.io/${OWNER}/${REPO}/journal-service"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_sha=${GHCR_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${GHCR_BASE}:latest" >> "$GITHUB_OUTPUT"
          {
            echo "all_tags<<EOF"
            echo "${GHCR_BASE}:${GITHUB_SHA}"
            echo "${GHCR_BASE}:latest"
            if [ -n "${ACR_LOGIN_SERVER}" ]; then
              echo "${ACR_LOGIN_SERVER}/journal-service:${GITHUB_SHA}"
              echo "${ACR_LOGIN_SERVER}/journal-service:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push image
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: services/journal-service
          file: services/journal-service/src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.tags.outputs.all_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan image
        if: steps.filter.outputs.journal == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.ghcr_sha }}
          severity: HIGH,CRITICAL
          exit-code: 0   # Phase 6: report only. Phase 7 flips to 1.
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Container build + Trivy scan + push (Phase 6: calendar-service). Mirrors
  # the journal-service container job — same OIDC + ACR + GHCR + Buildx flow,
  # gated per-service by dorny/paths-filter so changes that don't touch
  # calendar-service don't rebuild this image. Native-image is NOT on the
  # Phase 7 plan for cold-path Spring Boot.
  #
  # Build invokes :bootJar (Spring Boot Gradle plugin) — same as
  # journal-service. Output lands at build/libs/calendar-service-*.jar; the
  # Dockerfile.jvm COPYs it in directly.
  # ---------------------------------------------------------------------------
  containers-calendar-service:
    name: containers (calendar-service)
  # Container build + Trivy scan + push (Phase 6: user-config-service). Mirrors
  # the journal-service container job — same OIDC + ACR + GHCR + Buildx flow,
  # gated per-service by dorny/paths-filter so changes that don't touch
  # user-config-service don't rebuild this image. Native-image is NOT on the
  # Phase 7 plan for cold-path Spring Boot — the fat-jar Dockerfile is the
  # steady state.
  #
  # Build difference vs. the Quarkus services: this job invokes :bootJar
  # (Spring Boot Gradle plugin) instead of :quarkusBuild. The output lands
  # at build/libs/user-config-service-*.jar, which Dockerfile.jvm COPYs in
  # directly — no fast-jar layout, no quarkus-run.jar wrapper.
  # ---------------------------------------------------------------------------
  containers-user-config-service:
    name: containers (user-config-service)
  # Container build + Trivy scan + push (Phase 6: notification-service).
  # Mirrors the journal-service container job — same OIDC + ACR + GHCR +
  # Buildx flow, gated per-service by dorny/paths-filter so changes that
  # don't touch notification-service don't rebuild this image. Native-image
  # is NOT on the Phase 7 plan for cold-path Spring Boot — the fat-jar
  # Dockerfile is the steady state.
  #
  # Build difference vs. the Quarkus services: this job invokes :bootJar
  # (Spring Boot Gradle plugin) instead of :quarkusBuild. The output lands
  # at build/libs/notification-service-*.jar, which Dockerfile.jvm COPYs
  # in directly — no fast-jar layout, no quarkus-run.jar wrapper.
  # ---------------------------------------------------------------------------
  containers-notification-service:
    name: containers (notification-service)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write    # OIDC for `azure/login` so we can push to ACR.
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            calendar:
              - 'services/calendar-service/**'
            user_config:
              - 'services/user-config-service/**'
            notification:
              - 'services/notification-service/**'
              - 'shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '**/*.gradle.kts'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/main.yml'
              - 'deploy/helm/calendar-service/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
              - 'deploy/helm/user-config-service/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
              - 'deploy/helm/notification-service/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Assemble calendar-service fat-jar
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        run: ./gradlew :services:calendar-service:bootJar --no-daemon

      - name: Log in to GHCR
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Assemble user-config-service fat-jar
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        run: ./gradlew :services:user-config-service:bootJar --no-daemon

      - name: Log in to GHCR
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to 8.10.2 to match the wrapper. Quarkus 3.15.1 plugin is not
          # yet compatible with Gradle 9.x — the build is monorepo so even
          # cold-path Spring Boot services share the wrapper version.
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # bootJar produces the Spring Boot fat jar under build/libs/ without
      # re-running the test suite (already covered by the `build` job).
      - name: Assemble notification-service fat-jar
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        run: ./gradlew :services:notification-service:bootJar --no-daemon

      - name: Log in to GHCR
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        if: (steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_LOGIN_SERVER != ''
        if: (steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_LOGIN_SERVER != ''
        if: (steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_LOGIN_SERVER != ''
        uses: azure/login@v2
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: (steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_NAME != ''
        if: (steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_NAME != ''
        if: (steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.ACR_NAME != ''
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: az acr login --name "${ACR_NAME}"

      - name: Set up Buildx
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        id: tags
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          GHCR_BASE="ghcr.io/${OWNER}/${REPO}/calendar-service"
          GHCR_BASE="ghcr.io/${OWNER}/${REPO}/user-config-service"
          GHCR_BASE="ghcr.io/${OWNER}/${REPO}/notification-service"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_sha=${GHCR_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${GHCR_BASE}:latest" >> "$GITHUB_OUTPUT"
          {
            echo "all_tags<<EOF"
            echo "${GHCR_BASE}:${GITHUB_SHA}"
            echo "${GHCR_BASE}:latest"
            if [ -n "${ACR_LOGIN_SERVER}" ]; then
              echo "${ACR_LOGIN_SERVER}/calendar-service:${GITHUB_SHA}"
              echo "${ACR_LOGIN_SERVER}/calendar-service:latest"
              echo "${ACR_LOGIN_SERVER}/user-config-service:${GITHUB_SHA}"
              echo "${ACR_LOGIN_SERVER}/user-config-service:latest"
              echo "${ACR_LOGIN_SERVER}/notification-service:${GITHUB_SHA}"
              echo "${ACR_LOGIN_SERVER}/notification-service:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push image
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: services/calendar-service
          file: services/calendar-service/src/main/docker/Dockerfile.jvm
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: services/user-config-service
          file: services/user-config-service/src/main/docker/Dockerfile.jvm
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: services/notification-service
          file: services/notification-service/src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.tags.outputs.all_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan image
        if: steps.filter.outputs.calendar == 'true' || github.event_name == 'workflow_dispatch'
        if: steps.filter.outputs.user_config == 'true' || github.event_name == 'workflow_dispatch'
        if: steps.filter.outputs.notification == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.tags.outputs.ghcr_sha }}
          severity: HIGH,CRITICAL
          exit-code: 0   # Phase 6: report only. Phase 7 flips to 1.
          ignore-unfixed: true
