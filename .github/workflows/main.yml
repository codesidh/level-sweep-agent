# =============================================================================
# Main pipeline — runs on push to main.
# Per architecture-spec §19.1: build native images (Phase 7+; today JVM jars),
# integration tests, container scan (Trivy), push to GHCR.
# =============================================================================
name: main

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "adr/**"
      - "infra/**"

permissions:
  contents: read
  packages: write
  id-token: write   # OIDC for Azure (Phase 7+)

concurrency:
  group: main
  cancel-in-progress: false   # Never cancel a main build mid-flight.

jobs:

  build:
    name: build + integration
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to 8.10.2 to match the wrapper. Quarkus 3.15.1 plugin is not
          # yet compatible with Gradle 9.x (detachedConfiguration extension).
          gradle-version: 8.10.2

      - name: Bootstrap Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # Apply (auto-fix) — main.yml runs after merge, so any drift is from
      # broken pre-commit hygiene. Run apply, then fail if anything changed
      # so the offending PR author / commit is identified.
      - name: Spotless apply (Palantir Java + ktlint)
        run: ./gradlew spotlessApply --stacktrace

      - name: Fail if files were not pre-formatted
        run: |
          if ! git diff --exit-code; then
            echo "::error::Spotless rewrote files on main. Investigate the previous PR for missing pre-commit hooks."
            exit 1
          fi

      - name: Build all modules
        run: ./gradlew build --stacktrace

      - name: Integration tests (docker-compose dependencies)
        run: ./gradlew integrationTest --stacktrace

      - name: Replay parity (Decision Engine)
        run: ./gradlew replayTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

  # ---------------------------------------------------------------------------
  # Container build + Trivy scan + push to GHCR.
  # Phase 0 placeholder — Dockerfiles land in each service in Phase 7.
  # ---------------------------------------------------------------------------
  containers:
    name: containers (placeholder)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # TODO Phase 7: per-service Dockerfile + native-image build.
      # For now, this job exits successfully without producing images.
      - name: Phase 0 placeholder
        run: |
          echo "Container build is a stub in Phase 0."
          echo "Phase 7 will add Dockerfiles per service and run native-image."

      # Trivy scan — once images exist, point this at each ref.
      - name: Trivy filesystem scan (sources)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: 0   # Phase 0: don't fail; Phase 7+ flip to 1.
