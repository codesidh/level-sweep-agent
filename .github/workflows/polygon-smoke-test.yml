# =============================================================================
# Polygon / Massive WebSocket smoke test.
# Manual-trigger only. Uses POLYGON_API_KEY repo secret to verify the live WS
# subscription end-to-end without committing any service deploy.
#
# Trigger from the UI: Actions → polygon-smoke-test → Run workflow
# Or:    gh workflow run polygon-smoke-test.yml -R codesidh/level-sweep-agent
# =============================================================================
name: polygon-smoke-test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment scope to read POLYGON_API_KEY from"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      ws_url:
        description: "WebSocket URL (legacy polygon.io endpoint or massive.com if rebranded)"
        required: true
        default: "wss://socket.polygon.io/stocks"
        type: string
      ticker:
        description: "Symbol to subscribe (T.<sym> + Q.<sym>)"
        required: true
        default: "SPY"
        type: string
      duration_sec:
        description: "Listen duration in seconds"
        required: true
        default: "30"
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: ws-smoke
    # Pin to the GitHub Environment so secrets.POLYGON_API_KEY resolves from env scope.
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ws + dotenv
        run: npm install --no-save ws

      # ─────────────────────────────────────────────────────────────
      # REST entitlement check — ground truth for what the plan covers.
      # 200 + trade payload  →  real-time stocks entitlement is active
      # 403 / NOT_AUTHORIZED →  plan doesn't include real-time stocks
      # 401                  →  bad API key
      # ─────────────────────────────────────────────────────────────
      - name: REST diagnostic — /v2/last/trade/SPY (real-time entitlement)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          if [ -z "$POLYGON_API_KEY" ]; then
            echo "::error::POLYGON_API_KEY secret not set on env scope"
            exit 1
          fi
          echo "→ POST-redacted GET /v2/last/trade/SPY"
          # Pipe through tee so we see body + status. Mask key on failure.
          response=$(curl -sS -w "\n__HTTP__:%{http_code}\n" \
            "https://api.polygon.io/v2/last/trade/SPY?apiKey=$POLYGON_API_KEY")
          echo "$response" | sed 's/apiKey=[^&" ]*/apiKey=REDACTED/g'

      - name: REST diagnostic — /v2/aggs daily (basic REST access)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          echo "→ GET /v2/aggs/ticker/SPY/range/1/day/2024-01-02/2024-01-02"
          response=$(curl -sS -w "\n__HTTP__:%{http_code}\n" \
            "https://api.polygon.io/v2/aggs/ticker/SPY/range/1/day/2024-01-02/2024-01-02?apiKey=$POLYGON_API_KEY")
          echo "$response" | sed 's/apiKey=[^&" ]*/apiKey=REDACTED/g'

      - name: Connect, auth (wait), subscribe, log first messages
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          WS_URL: ${{ inputs.ws_url }}
          TICKER: ${{ inputs.ticker }}
          DURATION_SEC: ${{ inputs.duration_sec }}
        run: |
          node <<'EOF'
          const WebSocket = require('ws');
          const url = process.env.WS_URL;
          const ticker = process.env.TICKER;
          const duration = parseInt(process.env.DURATION_SEC, 10) * 1000;

          console.log(`→ connecting to ${url}`);
          const ws = new WebSocket(url);

          let authStatus = null;
          let subStatus = null;
          let trades = 0;
          let quotes = 0;
          let firstFew = [];

          const startedAt = Date.now();
          const timer = setTimeout(() => {
            console.log(`\n=== SUMMARY (${(duration/1000)|0}s) ===`);
            console.log(`auth status:      ${authStatus}`);
            console.log(`subscribe status: ${subStatus}`);
            console.log(`trades received:  ${trades}`);
            console.log(`quotes received:  ${quotes}`);
            console.log(`elapsed (ms):     ${Date.now() - startedAt}`);
            try { ws.close(); } catch (_) {}
            process.exit(authStatus === 'auth_success' ? 0 : 1);
          }, duration);

          // RACE FIX: wait for auth_success before sending subscribe.
          // (Production PolygonStream.java assumes Polygon queues subscribe
          // until auth completes, which the smoke test arrives 1ms-of-each-other
          // pattern can't strictly disprove. Defensive: explicit wait.)
          let authedSent = false;
          let subbedSent = false;
          ws.on('open', () => {
            console.log('  ✓ socket open');
            ws.send(JSON.stringify({ action: 'auth', params: process.env.POLYGON_API_KEY }));
            authedSent = true;
          });
          function trySubscribe() {
            if (subbedSent) return;
            subbedSent = true;
            // Subscribe to multiple channel families so we can see which the
            // current plan entitles. Each channel reports its own status.
            //   T.<sym>  — trades                  (Stocks Starter +)
            //   Q.<sym>  — NBBO quotes             (Stocks Starter +)
            //   AM.<sym> — per-minute aggregates   (broadly available)
            //   A.<sym>  — per-second aggregates   (Developer +)
            const params = `T.${ticker},Q.${ticker},AM.${ticker},A.${ticker}`;
            console.log(`  → subscribing to: ${params}`);
            ws.send(JSON.stringify({ action: 'subscribe', params }));
          }

          ws.on('message', (raw) => {
            const text = raw.toString();
            let msgs;
            try { msgs = JSON.parse(text); } catch (e) {
              console.log(`unparseable: ${text.substring(0, 200)}`);
              return;
            }
            if (!Array.isArray(msgs)) msgs = [msgs];
            for (const m of msgs) {
              if (m.ev === 'status') {
                console.log(`  [status] ${m.status}: ${m.message || ''}`);
                if (m.status === 'auth_success') {
                  authStatus = 'auth_success';
                  trySubscribe();
                }
                if (m.status === 'auth_failed' || m.status === 'auth_timeout') authStatus = m.status;
                if (m.status === 'success' && /subscribed/i.test(m.message || '')) subStatus = 'subscribed';
              } else if (m.ev === 'T') {
                trades++;
                if (firstFew.length < 5) {
                  firstFew.push(m);
                  console.log(`  [trade #${trades}] ${m.sym} @ ${m.p} sz=${m.s} t=${new Date(m.t).toISOString()}`);
                }
              } else if (m.ev === 'Q') {
                quotes++;
                if (firstFew.length < 8 && quotes <= 3) {
                  console.log(`  [quote] ${m.sym} bid=${m.bp}@${m.bs} ask=${m.ap}@${m.as}`);
                }
              } else if (m.ev === 'AM') {
                if (!global._amSeen) { global._amSeen = 1; console.log(`  [agg-min ✓] ${m.sym} c=${m.c} v=${m.v}`); }
              } else if (m.ev === 'A') {
                if (!global._aSeen) { global._aSeen = 1; console.log(`  [agg-sec ✓] ${m.sym} c=${m.c} v=${m.v}`); }
              }
            }
          });

          ws.on('error', (e) => {
            console.error(`::error::ws error: ${e.message}`);
          });

          ws.on('close', (code, reason) => {
            console.log(`  ⤫ socket closed: code=${code} reason=${reason || '(none)'}`);
          });
          EOF
