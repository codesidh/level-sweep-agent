# =============================================================================
# PR pipeline — runs on every pull request.
# Per architecture-spec §19.1: lint, build, unit tests, terraform plan/validate.
# Container scan + integration tests run on `main.yml`.
# =============================================================================
name: pr

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "adr/**"

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Java / Gradle build + spotless + unit tests
  # ---------------------------------------------------------------------------
  jvm:
    name: jvm-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}

      # Generate wrapper jar on the fly because we don't commit it.
      - name: Bootstrap Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Spotless check (Palantir Java format)
        run: ./gradlew spotlessCheck --stacktrace

      - name: Build + unit tests
        run: ./gradlew build --stacktrace

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

  # ---------------------------------------------------------------------------
  # Terraform formatting + validation (no plan; that runs on iac.yml)
  # ---------------------------------------------------------------------------
  terraform:
    name: terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: terraform validate (root)
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (modules)
        run: |
          set -e
          for d in infra/modules/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done

      - name: terraform validate (environments)
        run: |
          set -e
          for d in infra/environments/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done
