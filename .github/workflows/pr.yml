# =============================================================================
# PR pipeline — runs on every pull request.
# Per architecture-spec §19.1: lint, build, unit tests, terraform plan/validate.
# Container scan + integration tests run on `main.yml`.
# =============================================================================
name: pr

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "adr/**"

permissions:
  contents: write       # auto-commit Spotless fixes back to PR branch
  pull-requests: read
  checks: write

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Java / Gradle build + spotless + unit tests
  # ---------------------------------------------------------------------------
  jvm:
    name: jvm-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch (not detached HEAD) so we can push fixes back.
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin host Gradle to match the wrapper version. The Quarkus 3.15.1
          # plugin uses a detachedConfiguration-extending pattern that Gradle
          # 9.x forbids ("Extending a detachedConfiguration is not allowed"),
          # so we stay on 8.x until Quarkus releases a 9-compatible plugin.
          gradle-version: 8.10.2
          cache-read-only: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}

      # Generate wrapper jar on the fly because we don't commit it.
      - name: Bootstrap Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # Apply (auto-fix) instead of check — Spotless rewrites files in-place
      # in the ephemeral runner workspace. This keeps CI green on minor
      # formatting drift while still surfacing unformatted code via the
      # post-apply git-diff exit gate below.
      - name: Spotless apply (Palantir Java + ktlint)
        run: ./gradlew spotlessApply --stacktrace

      - name: Auto-commit Spotless fixes back to PR branch
        # If Spotless rewrote anything (excluding wrapper artifacts that the
        # bootstrap step regenerates), commit and push the fixes back to the
        # PR branch. This way contributors don't need a local Gradle/Spotless
        # install — CI is the source of truth for formatting.
        # The commit carries [skip ci] to avoid an immediately-redundant
        # second run; this current run continues with the formatted working
        # tree so build + tests still validate the final state.
        run: |
          if ! git diff --exit-code -- ':!gradlew' ':!gradlew.bat' ':!gradle/wrapper/'; then
            echo "::notice::Spotless rewrote files; committing back to ${{ github.head_ref }}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A -- ':!gradlew' ':!gradlew.bat' ':!gradle/wrapper/'
            git commit -m "style: auto-format with Spotless [skip ci]"
            git push
          else
            echo "::notice::Spotless: no changes."
          fi

      - name: Build + unit tests
        run: ./gradlew build --stacktrace

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

  # ---------------------------------------------------------------------------
  # Terraform formatting + validation (no plan; that runs on iac.yml)
  # ---------------------------------------------------------------------------
  terraform:
    name: terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: terraform validate (root)
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (modules)
        run: |
          set -e
          for d in infra/modules/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done

      - name: terraform validate (environments)
        run: |
          set -e
          for d in infra/environments/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done
