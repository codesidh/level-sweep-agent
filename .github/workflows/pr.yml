# =============================================================================
# PR pipeline — runs on every pull request.
# Per architecture-spec §19.1: lint, build, unit tests, terraform plan/validate.
# Container scan + integration tests run on `main.yml`.
# =============================================================================
name: pr

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "adr/**"

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Java / Gradle build + spotless + unit tests
  # ---------------------------------------------------------------------------
  jvm:
    name: jvm-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin host Gradle to match the wrapper version. The Quarkus 3.15.1
          # plugin uses a detachedConfiguration-extending pattern that Gradle
          # 9.x forbids ("Extending a detachedConfiguration is not allowed"),
          # so we stay on 8.x until Quarkus releases a 9-compatible plugin.
          gradle-version: 8.10.2
          cache-read-only: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}

      # Generate wrapper jar on the fly because we don't commit it.
      - name: Bootstrap Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # Apply (auto-fix) instead of check — Spotless rewrites files in-place
      # in the ephemeral runner workspace. This keeps CI green on minor
      # formatting drift while still surfacing unformatted code via the
      # post-apply git-diff exit gate below.
      - name: Spotless apply (Palantir Java + ktlint)
        run: ./gradlew spotlessApply --stacktrace

      - name: Fail if source files were not pre-formatted
        # Exclude wrapper artifacts: 'gradle wrapper' regenerates gradlew with
        # mode 100755 + LF endings on the runner; the repo committed those
        # from a Windows host with mode 100644 + CRLF. The diff is real but
        # not a Spotless violation. Only check actual source / config files.
        run: |
          if ! git diff --exit-code -- ':!gradlew' ':!gradlew.bat' ':!gradle/wrapper/'; then
            echo "::error::Spotless rewrote files. Run './gradlew spotlessApply' locally and commit before pushing."
            exit 1
          fi

      - name: Build + unit tests
        run: ./gradlew build --stacktrace

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

  # ---------------------------------------------------------------------------
  # Terraform formatting + validation (no plan; that runs on iac.yml)
  # ---------------------------------------------------------------------------
  terraform:
    name: terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: terraform validate (root)
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (modules)
        run: |
          set -e
          for d in infra/modules/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done

      - name: terraform validate (environments)
        run: |
          set -e
          for d in infra/environments/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done
