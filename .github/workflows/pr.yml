# =============================================================================
# PR pipeline — runs on every pull request.
# Per architecture-spec §19.1: lint, build, unit tests, terraform plan/validate.
# Container scan + integration tests run on `main.yml`.
#
# Per-job gating via dorny/paths-filter so a docs-only or skill-only PR runs
# zero heavy jobs. Each job's `if:` checks the paths-filter output for the
# relevant area. Paths the filter doesn't claim (skills, references, idea)
# fall through to no jobs running, which is the desired outcome.
# =============================================================================
name: pr

on:
  pull_request:
    branches: [main]
    # Top-level paths-ignore is intentionally minimal — most filtering happens
    # per-job below. Anything matched here causes the workflow to not even
    # start, which is the right behavior for files no job touches.
    paths-ignore:
      - ".claude/**"
      - "references/**"
      - "docs/idea/**"

permissions:
  contents: write       # auto-commit Spotless fixes back to PR branch
  pull-requests: read
  checks: write

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Compute changed paths once, gate every other job on the result.
  # ---------------------------------------------------------------------------
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      jvm:       ${{ steps.filter.outputs.jvm }}
      terraform: ${{ steps.filter.outputs.terraform }}
      helm:      ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            jvm:
              - 'services/**'
              - 'shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '**/*.gradle.kts'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/pr.yml'
            terraform:
              - 'infra/**'
              - '.github/workflows/pr.yml'
            helm:
              - 'deploy/helm/**'
              - '.github/workflows/pr.yml'

  # ---------------------------------------------------------------------------
  # Java / Gradle build + spotless + unit tests. Skipped when no JVM-relevant
  # paths changed.
  # ---------------------------------------------------------------------------
  jvm:
    name: jvm-build
    needs: changes
    if: needs.changes.outputs.jvm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch (not detached HEAD) so we can push fixes back.
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin host Gradle to match the wrapper version. The Quarkus 3.15.1
          # plugin uses a detachedConfiguration-extending pattern that Gradle
          # 9.x forbids ("Extending a detachedConfiguration is not allowed"),
          # so we stay on 8.x until Quarkus releases a 9-compatible plugin.
          gradle-version: 8.10.2
          cache-read-only: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}

      # Generate wrapper jar on the fly because we don't commit it.
      - name: Bootstrap Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      # Apply (auto-fix) instead of check — Spotless rewrites files in-place
      # in the ephemeral runner workspace. This keeps CI green on minor
      # formatting drift while still surfacing unformatted code via the
      # post-apply git-diff exit gate below.
      - name: Spotless apply (Palantir Java + ktlint)
        run: ./gradlew spotlessApply --stacktrace

      - name: Auto-commit Spotless fixes back to PR branch
        # If Spotless rewrote anything (excluding wrapper artifacts that the
        # bootstrap step regenerates), commit and push the fixes back to the
        # PR branch. This way contributors don't need a local Gradle/Spotless
        # install — CI is the source of truth for formatting.
        # The commit carries [skip ci] to avoid an immediately-redundant
        # second run; this current run continues with the formatted working
        # tree so build + tests still validate the final state.
        run: |
          if ! git diff --exit-code -- ':!gradlew' ':!gradlew.bat' ':!gradle/wrapper/'; then
            echo "::notice::Spotless rewrote files; committing back to ${{ github.head_ref }}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A -- ':!gradlew' ':!gradlew.bat' ':!gradle/wrapper/'
            git commit -m "style: auto-format with Spotless [skip ci]"
            git push
          else
            echo "::notice::Spotless: no changes."
          fi

      - name: Build + unit tests
        run: ./gradlew build --stacktrace

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**

  # ---------------------------------------------------------------------------
  # Terraform formatting + validation (no plan; that runs on iac.yml). Skipped
  # when no infra files changed.
  # ---------------------------------------------------------------------------
  terraform:
    name: terraform
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: terraform validate (root)
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (modules)
        run: |
          set -e
          for d in infra/modules/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done

      - name: terraform validate (environments)
        run: |
          set -e
          for d in infra/environments/*/; do
            echo "::group::validate ${d}"
            (cd "$d" && terraform init -backend=false && terraform validate)
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  # Helm chart lint — catches templating bugs before deploy-dev.yml runs them
  # against a real cluster. Cheap (~10s) so worth gating every relevant PR.
  # Skipped when no chart files changed.
  # ---------------------------------------------------------------------------
  helm:
    name: helm lint
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm lint (market-data-service)
        run: helm lint deploy/helm/market-data-service

      - name: helm lint (execution-service)
        run: helm lint deploy/helm/execution-service

      - name: helm template (market-data-service smoke render)
        # Render with the same `--set` keys deploy-dev.yml passes, so a chart
        # bug (missing required value, bad function call) surfaces here too.
        run: |
          helm template market-data-service deploy/helm/market-data-service \
            --namespace market-data \
            --set image.repository=acr.example.azurecr.io/market-data-service \
            --set image.tag=ci-test \
            --set workloadIdentity.clientId=00000000-0000-0000-0000-000000000000 \
            --set keyVault.tenantId=11111111-1111-1111-1111-111111111111 \
            --set keyVault.name=kv-example \
            --set keyVault.vaultUri=https://kv-example.vault.azure.net/ \
            > /tmp/rendered.yaml
          # Sanity-check the render produced the expected kinds. PDB is conditional —
          # only present when deployment.strategy=RollingUpdate (Phase 7+); the
          # default strategy=Recreate path skips it intentionally to avoid blocking
          # voluntary evictions on a single-replica deployment.
          for kind in Deployment Service ServiceAccount SecretProviderClass NetworkPolicy; do
            if ! grep -q "^kind: ${kind}$" /tmp/rendered.yaml; then
              echo "::error::helm template did not produce a ${kind} resource"
              exit 1
            fi
          done

      - name: helm template (execution-service smoke render)
        # Same smoke-render pattern as market-data-service. PDB is conditional
        # on strategy=RollingUpdate, so the default strategy=Recreate path
        # intentionally skips it.
        run: |
          helm template execution-service deploy/helm/execution-service \
            --namespace execution \
            --set image.repository=acr.example.azurecr.io/execution-service \
            --set image.tag=ci-test \
            --set workloadIdentity.clientId=00000000-0000-0000-0000-000000000000 \
            --set keyVault.tenantId=11111111-1111-1111-1111-111111111111 \
            --set keyVault.name=kv-example \
            --set keyVault.vaultUri=https://kv-example.vault.azure.net/ \
            > /tmp/rendered-exec.yaml
          for kind in Deployment Service ServiceAccount SecretProviderClass NetworkPolicy; do
            if ! grep -q "^kind: ${kind}$" /tmp/rendered-exec.yaml; then
              echo "::error::execution-service helm template did not produce a ${kind} resource"
              exit 1
            fi
          done
