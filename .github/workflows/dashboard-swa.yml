name: dashboard-swa

# Builds and deploys the Phase 6 Angular operator dashboard to Azure Static
# Web Apps (https://salmon-flower-067f4480f.7.azurestaticapps.net). Mirrors the
# pattern of `static-web-app.yml` (which deploys the architecture HTML), but
# adds the npm build step the SPA needs.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/dashboard-swa.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/dashboard-swa.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write   # azure/static-web-apps-deploy posts preview URLs

concurrency:
  group: dashboard-swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: build + deploy dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Mirror the secret into env so we can reference it in the step `if:`.
      # GitHub Actions disallows `secrets.*` directly in conditions.
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DASHBOARD }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Skip if SWA token not configured
        if: env.SWA_TOKEN == ''
        run: |
          echo "::notice::AZURE_STATIC_WEB_APPS_API_TOKEN_DASHBOARD not set yet — skipping deploy."
          echo "::notice::Set the SWA's api_key as that secret in repo settings to enable."
          exit 0

      - uses: actions/setup-node@v4
        if: env.SWA_TOKEN != ''
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (frontend)
        if: env.SWA_TOKEN != ''
        working-directory: frontend
        run: npm ci

      - name: npm run build (frontend)
        if: env.SWA_TOKEN != ''
        working-directory: frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        if: env.SWA_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # The Angular bundle is already built on the runner; the action just
          # uploads the static contents. skip_app_build keeps the SWA Oryx
          # builder out of the loop.
          app_location: frontend
          api_location: ""
          output_location: dist/levelsweep-dashboard/browser
          skip_app_build: true
