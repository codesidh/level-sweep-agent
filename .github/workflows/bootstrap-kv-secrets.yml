name: bootstrap-kv-secrets

# One-shot workflow that copies the dev GitHub-environment secrets into
# the dev Azure Key Vault. Triggered manually after `terraform apply`
# provisions the KV, and after each rotation of the source secrets.
#
# Why this exists: the AKS pod consumes secrets via the Azure Key Vault
# CSI driver, which only knows how to read from KV — not from GitHub.
# This bridges the two without ever surfacing values in logs or to the
# operator's local shell.

on:
  workflow_dispatch:
    inputs:
      include_anthropic:
        description: "Also seed ANTHROPIC_API_KEY (only valid once Phase 4 secret is set)."
        required: false
        type: boolean
        default: false
      include_trading_economics:
        description: "Also seed TRADING_ECONOMICS_API_KEY (Phase 1 news blackout filter)."
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: bootstrap-kv-secrets
  cancel-in-progress: false

jobs:
  seed:
    name: seed dev KV from GitHub secrets
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 5
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Seed Alpaca credentials
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          set -euo pipefail
          [[ -n "$ALPACA_API_KEY" ]]    || { echo "::error::ALPACA_API_KEY not set"; exit 1; }
          [[ -n "$ALPACA_SECRET_KEY" ]] || { echo "::error::ALPACA_SECRET_KEY not set"; exit 1; }
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name alpaca-api-key    --value "$ALPACA_API_KEY"    --only-show-errors --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name alpaca-secret-key --value "$ALPACA_SECRET_KEY" --only-show-errors --output none
          echo "::notice::seeded alpaca-api-key, alpaca-secret-key"

      - name: Seed Anthropic credential (optional)
        if: ${{ inputs.include_anthropic == true }}
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          [[ -n "$ANTHROPIC_API_KEY" ]] || { echo "::error::ANTHROPIC_API_KEY not set"; exit 1; }
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name anthropic-api-key --value "$ANTHROPIC_API_KEY" --only-show-errors --output none
          echo "::notice::seeded anthropic-api-key"

      - name: Seed Trading Economics credential (optional)
        if: ${{ inputs.include_trading_economics == true }}
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
          TRADING_ECONOMICS_API_KEY: ${{ secrets.TRADING_ECONOMICS_API_KEY }}
        run: |
          set -euo pipefail
          [[ -n "$TRADING_ECONOMICS_API_KEY" ]] || { echo "::error::TRADING_ECONOMICS_API_KEY not set"; exit 1; }
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name trading-economics-api-key --value "$TRADING_ECONOMICS_API_KEY" --only-show-errors --output none
          echo "::notice::seeded trading-economics-api-key"

      - name: Verify seeded secrets are non-placeholder
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          for s in alpaca-api-key alpaca-secret-key; do
            v=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$s" --query value -o tsv)
            if [[ "$v" == "REPLACE_AFTER_APPLY" ]]; then
              echo "::error::secret $s is still the TF placeholder"
              exit 1
            fi
          done
          echo "::notice::verified seeded secrets are non-placeholder"
