# =============================================================================
# Deploy market-data-service to the dev AKS cluster.
#
# Trigger: workflow_run on a successful `main` workflow completion. This
# guarantees the SHA-tagged image has been pushed to ACR before we attempt to
# pull it from AKS. The previous `on: push` trigger raced main.yml's container
# job and could schedule a deploy minutes before the image existed.
# Manual `workflow_dispatch` is also supported.
#
# Required GitHub environment "dev" secrets (configure post-`terraform apply`):
#   AZURE_CLIENT_ID                       — gha_client_id TF output
#   AZURE_TENANT_ID                       — tenant_id TF output
#   AZURE_SUBSCRIPTION_ID                 — `az account show --query id -o tsv`
#   AKS_CLUSTER_NAME                      — aks_cluster_name TF output
#   AKS_RESOURCE_GROUP                    — aks_resource_group TF output
#   AKS_KUBELET_CLIENT_ID                 — aks_kubelet_client_id TF output
#                                           (Phase 1 KV CSI client; Phase 7 swaps
#                                           in a per-service workload MI)
#   ACR_LOGIN_SERVER                      — acr_login_server TF output
#   KEY_VAULT_NAME                        — key_vault_name TF output
#   KEY_VAULT_URI                         — key_vault_uri TF output
#
# The App Insights connection string flows through Azure Key Vault rather than
# a GitHub secret — it's stored as the `applicationinsights-connection-string`
# KV secret and mounted into the pod via the CSI SecretProviderClass. The
# App Insights Java agent (Dockerfile.jvm) reads
# APPLICATIONINSIGHTS_CONNECTION_STRING at runtime and ships telemetry.
# =============================================================================
name: deploy-dev

on:
  workflow_run:
    workflows: [main]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC federation token for azure/login
  contents: read

concurrency:
  # Serialize dev rollouts so we never have two helm upgrades fighting.
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy market-data-service to dev
    # Gate on main.yml success when triggered by workflow_run. workflow_dispatch
    # bypasses this check (operator confirmed by manual click).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    steps:
      # On workflow_run, checkout defaults to the default branch tip — pin to
      # the head_sha that main.yml just built so the chart and the image are
      # in lockstep.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          # AKS API server now requires AAD auth; convert kubeconfig from the
          # interactive azurecli plugin to the non-interactive form so the
          # OIDC token from azure/login is consumed without prompting.
          kubelogin convert-kubeconfig -l azurecli

      # workflow_run does not check out the repo's head by default — it lands
      # on the same SHA the triggering workflow ran against. For workflow_run
      # triggers, prefer the workflow_run head_sha so the deployed image tag
      # matches what main.yml just pushed. workflow_dispatch falls back to
      # github.sha (the branch tip).
      - name: Resolve image tag SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm upgrade --install
        run: |
          helm upgrade --install market-data-service deploy/helm/market-data-service \
            --namespace market-data \
            --create-namespace \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/market-data-service" \
            --set image.tag="${{ steps.sha.outputs.value }}" \
            --set workloadIdentity.clientId="${{ secrets.AKS_KUBELET_CLIENT_ID }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.name="${{ secrets.KEY_VAULT_NAME }}" \
            --set keyVault.vaultUri="${{ secrets.KEY_VAULT_URI }}" \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n market-data rollout status deployment/market-data-service --timeout=5m
          kubectl -n market-data get pods,svc

      - name: Dump pod state on failure (market-data)
        if: failure()
        run: |
          echo "::group::nodes"
          kubectl get nodes -o wide || true
          echo "::endgroup::"
          echo "::group::pods"
          kubectl -n market-data get pods -o wide || true
          echo "::endgroup::"
          echo "::group::describe"
          kubectl -n market-data describe pods -l app.kubernetes.io/name=market-data-service || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl -n market-data get events --sort-by='.lastTimestamp' | tail -50 || true
          echo "::endgroup::"
          echo "::group::logs"
          kubectl -n market-data logs -l app.kubernetes.io/name=market-data-service --tail=200 --all-containers || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Phase 3 — execution-service deploy. Mirrors the market-data-service job
  # above. The two services live in distinct namespaces (market-data,
  # execution-service) so a failed deploy of one does not block the other.
  # The federated-identity binding for the SA
  #   system:serviceaccount:execution-service:execution-service
  # is created by `infra/environments/dev/main.tf` →
  # azurerm_federated_identity_credential.execution_service_sa, which must be
  # applied by iac.yml before this job runs successfully against a fresh
  # cluster.
  # ---------------------------------------------------------------------------
  deploy-execution-service:
    name: deploy execution-service to dev
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    steps:
      # On workflow_run, checkout defaults to the default branch tip — pin to
      # the head_sha that main.yml just built so the chart and the image are
      # in lockstep.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          # AKS API server now requires AAD auth; convert kubeconfig from the
          # interactive azurecli plugin to the non-interactive form so the
          # OIDC token from azure/login is consumed without prompting.
          kubelogin convert-kubeconfig -l azurecli

      - name: Resolve image tag SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm upgrade --install
        # `appInsights.connectionStringSecretName` is passed for forward-compat
        # with the chart's planned dedicated value key; today the connection
        # string flows in via the `keyVault.objects[].env:
        # APPLICATIONINSIGHTS_CONNECTION_STRING` mount, and the templates
        # ignore the extra --set. Keeping it here means a chart bump that
        # introduces the key works without a workflow edit.
        run: |
          helm upgrade --install execution-service deploy/helm/execution-service \
            --namespace execution-service \
            --create-namespace \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/execution-service" \
            --set image.tag="${{ steps.sha.outputs.value }}" \
            --set workloadIdentity.clientId="${{ secrets.AKS_KUBELET_CLIENT_ID }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.name="${{ secrets.KEY_VAULT_NAME }}" \
            --set keyVault.vaultUri="${{ secrets.KEY_VAULT_URI }}" \
            --set appInsights.connectionStringSecretName=applicationinsights-connection-string \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n execution-service rollout status deployment/execution-service --timeout=5m
          kubectl -n execution-service get pods,svc

      - name: Dump pod state on failure (execution-service)
        if: failure()
        run: |
          echo "::group::nodes"
          kubectl get nodes -o wide || true
          echo "::endgroup::"
          echo "::group::pods"
          kubectl -n execution-service get pods -o wide || true
          echo "::endgroup::"
          echo "::group::describe"
          kubectl -n execution-service describe pods -l app.kubernetes.io/name=execution-service || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl -n execution-service get events --sort-by='.lastTimestamp' | tail -50 || true
          echo "::endgroup::"
          echo "::group::logs"
          kubectl -n execution-service logs -l app.kubernetes.io/name=execution-service --tail=200 --all-containers || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Phase 4 — ai-agent-service deploy. Mirrors the execution-service job
  # above. Lives in its own namespace `ai-agent` so a failed deploy of one
  # service does not block the others. The federated-identity binding for
  # the SA
  #   system:serviceaccount:ai-agent:ai-agent-service
  # is created by `infra/environments/dev/main.tf` →
  # azurerm_federated_identity_credential.ai_agent_service_sa, which must be
  # applied by iac.yml before this job runs successfully against a fresh
  # cluster.
  #
  # Operator setup before first run: mirror the GitHub `dev` environment
  # ANTHROPIC_API_KEY secret into Key Vault as `anthropic-api-key`. Until that
  # secret exists in KV, the chart's CSI mount fails and the pod stays in
  # ContainerCreating. Mirror command (run once):
  #   az keyvault secret set --vault-name <KEY_VAULT_NAME> \
  #     --name anthropic-api-key --value "<owner Anthropic API key>"
  # ---------------------------------------------------------------------------
  deploy-ai-agent-service:
    name: deploy ai-agent-service to dev
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    steps:
      # On workflow_run, checkout defaults to the default branch tip — pin to
      # the head_sha that main.yml just built so the chart and the image are
      # in lockstep.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          # AKS API server now requires AAD auth; convert kubeconfig from the
          # interactive azurecli plugin to the non-interactive form so the
          # OIDC token from azure/login is consumed without prompting.
          kubelogin convert-kubeconfig -l azurecli

      - name: Resolve image tag SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm upgrade --install
        # The Anthropic API key flows through Key Vault rather than a GitHub
        # secret — it's stored as the `anthropic-api-key` KV secret and
        # mounted into the pod via the CSI SecretProviderClass under the
        # workload identity bound to the federated credential applied by TF.
        # Operators must mirror ANTHROPIC_API_KEY (GitHub `dev` env secret)
        # into KV before this job's first successful run; see job header.
        run: |
          helm upgrade --install ai-agent-service deploy/helm/ai-agent-service \
            --namespace ai-agent \
            --create-namespace \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/ai-agent-service" \
            --set image.tag="${{ steps.sha.outputs.value }}" \
            --set workloadIdentity.clientId="${{ secrets.AKS_KUBELET_CLIENT_ID }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.name="${{ secrets.KEY_VAULT_NAME }}" \
            --set keyVault.vaultUri="${{ secrets.KEY_VAULT_URI }}" \
            --set appInsights.connectionStringSecretName=applicationinsights-connection-string \
            --set anthropic.apiKeySecretName=anthropic-api-key \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n ai-agent rollout status deployment/ai-agent-service --timeout=5m
          kubectl -n ai-agent get pods,svc

      - name: Dump pod state on failure (ai-agent-service)
        if: failure()
        run: |
          echo "::group::nodes"
          kubectl get nodes -o wide || true
          echo "::endgroup::"
          echo "::group::pods"
          kubectl -n ai-agent get pods -o wide || true
          echo "::endgroup::"
          echo "::group::describe"
          kubectl -n ai-agent describe pods -l app.kubernetes.io/name=ai-agent-service || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl -n ai-agent get events --sort-by='.lastTimestamp' | tail -50 || true
          echo "::endgroup::"
          echo "::group::logs"
          kubectl -n ai-agent logs -l app.kubernetes.io/name=ai-agent-service --tail=200 --all-containers || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Phase 6 — journal-service deploy. Mirrors the ai-agent-service job above.
  # Lives in its own namespace `journal-service` so a failed deploy of one
  # service does not block the others. The federated-identity binding for
  # the SA
  #   system:serviceaccount:journal-service:journal-service
  # is created by `infra/environments/dev/main.tf` →
  # azurerm_federated_identity_credential.journal_service_sa, which must be
  # applied by iac.yml before this job runs successfully against a fresh
  # cluster.
  #
  # No KV secret pre-mirroring is required for Phase 6 — the only KV object
  # mounted is the App Insights connection string (already mirrored from
  # the Phase 1 bootstrap). Mongo URL is in-cluster plain-text in env until
  # Phase 7 swaps in managed Cosmos / MongoDB Atlas per architecture-spec
  # §13.2.
  # ---------------------------------------------------------------------------
  deploy-journal-service:
    name: deploy journal-service to dev
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    steps:
      # On workflow_run, checkout defaults to the default branch tip — pin to
      # the head_sha that main.yml just built so the chart and the image are
      # in lockstep.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Resolve image tag SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm upgrade --install
        run: |
          helm upgrade --install journal-service deploy/helm/journal-service \
            --namespace journal-service \
            --create-namespace \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/journal-service" \
            --set image.tag="${{ steps.sha.outputs.value }}" \
            --set workloadIdentity.clientId="${{ secrets.AKS_KUBELET_CLIENT_ID }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.name="${{ secrets.KEY_VAULT_NAME }}" \
            --set keyVault.vaultUri="${{ secrets.KEY_VAULT_URI }}" \
            --set appInsights.connectionStringSecretName=applicationinsights-connection-string \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n journal-service rollout status deployment/journal-service --timeout=5m
          kubectl -n journal-service get pods,svc

      - name: Dump pod state on failure (journal-service)
        if: failure()
        run: |
          echo "::group::nodes"
          kubectl get nodes -o wide || true
          echo "::endgroup::"
          echo "::group::pods"
          kubectl -n journal-service get pods -o wide || true
          echo "::endgroup::"
          echo "::group::describe"
          kubectl -n journal-service describe pods -l app.kubernetes.io/name=journal-service || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl -n journal-service get events --sort-by='.lastTimestamp' | tail -50 || true
          echo "::endgroup::"
          echo "::group::logs"
          kubectl -n journal-service logs -l app.kubernetes.io/name=journal-service --tail=200 --all-containers || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Phase 6 — calendar-service deploy. Mirrors the journal-service job above.
  # Lives in its own namespace `calendar-service`. The federated-identity
  # binding for the SA `system:serviceaccount:calendar-service:calendar-service`
  # is created by infra/environments/dev/main.tf →
  # azurerm_federated_identity_credential.calendar_service_sa.
  #
  # No Key Vault objects to mount — the calendar has no secrets. The chart
  # disables keyVault entirely (values.yaml `keyVault.enabled: false`), so
  # the --set keyVault.* flags below are inert no-ops kept for symmetry with
  # the other deploy jobs (so the workflow file diffs cleanly when Phase 7
  # adds an economic-calendar API key).
  # ---------------------------------------------------------------------------
  deploy-calendar-service:
    name: deploy calendar-service to dev
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Resolve image tag SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm upgrade --install
        run: |
          helm upgrade --install calendar-service deploy/helm/calendar-service \
            --namespace calendar-service \
            --create-namespace \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/calendar-service" \
            --set image.tag="${{ steps.sha.outputs.value }}" \
            --set workloadIdentity.clientId="${{ secrets.AKS_KUBELET_CLIENT_ID }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n calendar-service rollout status deployment/calendar-service --timeout=5m
          kubectl -n calendar-service get pods,svc

      - name: Dump pod state on failure (calendar-service)
        if: failure()
        run: |
          echo "::group::nodes"
          kubectl get nodes -o wide || true
          echo "::endgroup::"
          echo "::group::pods"
          kubectl -n calendar-service get pods -o wide || true
          echo "::endgroup::"
          echo "::group::describe"
          kubectl -n calendar-service describe pods -l app.kubernetes.io/name=calendar-service || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl -n calendar-service get events --sort-by='.lastTimestamp' | tail -50 || true
          echo "::endgroup::"
          echo "::group::logs"
          kubectl -n calendar-service logs -l app.kubernetes.io/name=calendar-service --tail=200 --all-containers || true
          echo "::endgroup::"
