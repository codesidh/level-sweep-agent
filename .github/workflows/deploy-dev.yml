# =============================================================================
# Deploy market-data-service to the dev AKS cluster.
#
# Trigger: workflow_run on a successful `main` workflow completion. This
# guarantees the SHA-tagged image has been pushed to ACR before we attempt to
# pull it from AKS. The previous `on: push` trigger raced main.yml's container
# job and could schedule a deploy minutes before the image existed.
# Manual `workflow_dispatch` is also supported.
#
# Required GitHub environment "dev" secrets (configure post-`terraform apply`):
#   AZURE_CLIENT_ID                       — gha_client_id TF output
#   AZURE_TENANT_ID                       — tenant_id TF output
#   AZURE_SUBSCRIPTION_ID                 — `az account show --query id -o tsv`
#   AKS_CLUSTER_NAME                      — aks_cluster_name TF output
#   AKS_RESOURCE_GROUP                    — aks_resource_group TF output
#   AKS_KUBELET_CLIENT_ID                 — aks_kubelet_client_id TF output
#                                           (Phase 1 KV CSI client; Phase 7 swaps
#                                           in a per-service workload MI)
#   ACR_LOGIN_SERVER                      — acr_login_server TF output
#   KEY_VAULT_NAME                        — key_vault_name TF output
#   KEY_VAULT_URI                         — key_vault_uri TF output
#
# The App Insights connection string flows through Azure Key Vault rather than
# a GitHub secret — it's stored as the `applicationinsights-connection-string`
# KV secret and mounted into the pod via the CSI SecretProviderClass. The
# App Insights Java agent (Dockerfile.jvm) reads
# APPLICATIONINSIGHTS_CONNECTION_STRING at runtime and ships telemetry.
# =============================================================================
name: deploy-dev

on:
  workflow_run:
    workflows: [main]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC federation token for azure/login
  contents: read

concurrency:
  # Serialize dev rollouts so we never have two helm upgrades fighting.
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy market-data-service to dev
    # Gate on main.yml success when triggered by workflow_run. workflow_dispatch
    # bypasses this check (operator confirmed by manual click).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    steps:
      # On workflow_run, checkout defaults to the default branch tip — pin to
      # the head_sha that main.yml just built so the chart and the image are
      # in lockstep.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          # AKS API server now requires AAD auth; convert kubeconfig from the
          # interactive azurecli plugin to the non-interactive form so the
          # OIDC token from azure/login is consumed without prompting.
          kubelogin convert-kubeconfig -l azurecli

      # workflow_run does not check out the repo's head by default — it lands
      # on the same SHA the triggering workflow ran against. For workflow_run
      # triggers, prefer the workflow_run head_sha so the deployed image tag
      # matches what main.yml just pushed. workflow_dispatch falls back to
      # github.sha (the branch tip).
      - name: Resolve image tag SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm upgrade --install
        run: |
          helm upgrade --install market-data-service deploy/helm/market-data-service \
            --namespace market-data \
            --create-namespace \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/market-data-service" \
            --set image.tag="${{ steps.sha.outputs.value }}" \
            --set workloadIdentity.clientId="${{ secrets.AKS_KUBELET_CLIENT_ID }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.name="${{ secrets.KEY_VAULT_NAME }}" \
            --set keyVault.vaultUri="${{ secrets.KEY_VAULT_URI }}" \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl -n market-data rollout status deployment/market-data-service --timeout=5m
          kubectl -n market-data get pods,svc
