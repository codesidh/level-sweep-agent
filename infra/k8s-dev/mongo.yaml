# =============================================================================
# Dev-grade single-pod MongoDB for Phase 1+3+4+5+6 to unblock paper-trading
# soak. NOT production-grade — emptyDir volume, no auth, no replication. Phase 7
# replaces with managed Cosmos / MongoDB Atlas per architecture-spec §13.2.
#
# Apply: `kubectl apply -f infra/k8s-dev/mongo.yaml`
#
# Consumer services point MONGO_URL at `mongo.mongo.svc.cluster.local:27017`.
# Bare `mongo` resolves only inside this namespace, so consumers must use the
# FQDN. Helm values.yaml in deploy/helm/<service>/values.yaml will be updated
# by a follow-up PR; this manifest + a one-time `kubectl set env` patches
# the live deployments.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
              name: mongo
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1024Mi
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          # emptyDir is ephemeral — data is lost on pod restart. That's
          # acceptable for the dev paper-trading soak; Phase 7 swaps in a
          # PVC + StatefulSet against managed Cosmos / MongoDB Atlas.
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: mongo
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
  type: ClusterIP
