quarkus:
  application:
    name: execution-service
  http:
    port: 8083
  log:
    level: INFO
    category:
      "com.levelsweep":
        level: INFO
    console:
      json:
        ~: true
        # MDC keys mandatory per architecture-spec §18.3 + multi-tenant-readiness skill.
        # tenant_id and trace_id MUST appear on every log line.
        additional-field:
          "tenant_id":
            value: "${TENANT_ID:OWNER}"
            type: "string"
          "service":
            value: "execution-service"
            type: "string"
  opentelemetry:
    enabled: true
    tracer:
      exporter:
        otlp:
          endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}"
  micrometer:
    export:
      prometheus:
        enabled: true
        path: /q/metrics
  # SmallRye Health — liveness/readiness endpoints exposed to AKS probes
  # (architecture-spec §17.4 / §21.1). Default root-path is already /q/health;
  # declared explicitly so future operators see it documented.
  smallrye-health:
    root-path: /q/health

  # MS SQL datasource (architecture-spec §13.1). Phase 3 Step 1 does not write
  # to the DB — the orders + fills + stops tables land in Step 2/3. Health is
  # disabled so a transient DB outage does not flap liveness; readiness is
  # FSM-driven (will be wired in Step 2+).
  datasource:
    db-kind: mssql
    username: "${MSSQL_USER:sa}"
    password: "${MSSQL_PASSWORD:LevelSweep!2026}"
    jdbc:
      url: "${MSSQL_URL:jdbc:sqlserver://localhost:1433;databaseName=level_sweep;encrypt=false}"
    health:
      enabled: false

# Kafka topic consumed — see architecture-spec §12.1 row 5
# (tenant.commands). Execution Service joins consumer group `execution-service`
# and reads the TradeProposed stream produced by the decision-engine Trade Saga.
# Auto-offset-reset is `latest` so a restart does not replay 30 days of historic
# trades (idempotent client_order_id keys would prevent duplicate orders, but
# the in-flight FSM state would still be incoherent). Replay parity for backfill
# flows through the Replay Harness in Phase 3 Step 7, not through Kafka.
kafka:
  bootstrap:
    servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"

mp:
  messaging:
    incoming:
      # The value deserializer is the typed TradeProposedDeserializer subclass
      # (extends ObjectMapperDeserializer<TradeProposed>); this is the canonical
      # Quarkus recipe for Jackson-based deserialization because Kafka discards
      # type info on the wire and a plain ObjectMapperDeserializer wouldn't know
      # what to instantiate. Mirrors decision-engine's BarDeserializer wiring.
      # See: https://quarkus.io/guides/kafka#kafka-serialization
      trade-proposed-in:
        connector: smallrye-kafka
        topic: tenant.commands
        group.id: execution-service
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.execution.ingest.TradeProposedDeserializer
      # Phase 3 S4 Stop Watcher — bars + indicator snapshots from
      # market-data-service on the 2-minute timeframe. Joined by (symbol,
      # timestamp) inside BarIndicatorJoiner; §9 trigger fires only when
      # both sides arrive within 5s (ADR-0005 §1, fail-closed otherwise).
      # auto.offset.reset is `latest` so a restart does not replay 30 days
      # of historic bars (the watcher's registered-stops are in-memory and
      # repopulate from new TradeFilled events, not from history).
      bars-2m:
        connector: smallrye-kafka
        topic: market.bars.2m
        group.id: execution-service
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.execution.stopwatch.BarDeserializer
      indicators-2m:
        connector: smallrye-kafka
        topic: market.indicators.2m
        group.id: execution-service
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.execution.stopwatch.IndicatorSnapshotDeserializer
    outgoing:
      # Phase 3 Step 3 — fills produced by the Alpaca trade-updates WS listener
      # are published to tenant.fills (architecture-spec §12.1). Keyed by
      # tenantId so the broker partitions per-tenant; the decision-engine
      # per-trade FSM is the primary downstream consumer (drives ENTERED ->
      # ACTIVE on first fill). Mirrors decision-engine's trade-proposed-out.
      trade-filled-out:
        connector: smallrye-kafka
        topic: tenant.fills
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer

alpaca:
  # Phase A: owner token from env / Key Vault. Phase B: per-tenant OAuth.
  # Phase 3 Step 2 (order placement) wires the Alpaca REST client; Step 3 (the
  # trade-updates WS listener) wires the FillListenerService. Both bind the
  # same api-key/secret-key pair as Optional<String> on the consumer side so
  # dev / replay can boot with empty values.
  base-url: "${ALPACA_BASE_URL:https://paper-api.alpaca.markets}"
  # Phase 3 Step 3 — paper trade-updates WebSocket endpoint
  # (architecture-spec §3.6). The FillListenerService binds this; live prod
  # will swap to the live trading WS endpoint via env override.
  trade-updates-url: "${ALPACA_TRADE_UPDATES_URL:wss://paper-api.alpaca.markets/stream}"
  key-id: "${ALPACA_KEY_ID:}"
  api-key: "${ALPACA_API_KEY:${ALPACA_KEY_ID:}}"
  secret-key: "${ALPACA_SECRET_KEY:}"

# Per-tenant + per-trace MDC keys. `tenant.id` is read by the startup banner
# and by future order/fill/stop components via @ConfigProperty.
levelsweep:
  tenant:
    bootstrap-id: OWNER
  log:
    mdc-keys:
      - tenant_id
      - trace_id
      - trade_id
      - client_order_id
  feature-flags:
    # Phase B flags — see docs/feature-flags.md. ALL OFF.
    phase-b-multi-tenant-onboarding: false
    phase-b-alpaca-oauth: false
  # Phase 3 S5 Trail Manager (ADR-0005 §2). Sustainment-3 is the default —
  # a single noisy NBBO snapshot never advances the FSM. Phase 3 soak data
  # may re-tune; Phase 8 production locks the value.
  trail:
    sustainment-snapshots: 3
    activation-upl-pct: "0.30"
    ratchet-step-pct: "0.05"

tenant:
  id: "${TENANT_ID:OWNER}"

# Production profile — when the App Insights Java agent is attached
# (-javaagent at runtime), it owns the full OTel pipeline (traces + metrics +
# logs) and auto-instruments JDBC / Mongo / Kafka / SLF4J. Disabling Quarkus'
# own OTel here prevents (a) double-emit, (b) SDK-lifecycle races on shutdown,
# and (c) confused trace IDs when both pipes register exporters. Mirrors
# decision-engine + market-data-service.
#
# The dev cluster has no Kafka in Phase 3 (Strimzi lands in Phase 6 per
# architecture-spec §12), so the trade-proposed-in incoming channel swaps to
# the in-memory connector. The @Incoming-annotated TradeProposedConsumer still
# wires up — it just receives events from the in-memory bus instead of Kafka.
# In dev nothing produces to the in-memory channel yet, so the consumer is
# dormant by design until Phase 3 Step 7 (Replay Harness) feeds it.
"%prod":
  quarkus:
    opentelemetry:
      enabled: false
    datasource:
      health:
        enabled: false
  mp:
    messaging:
      incoming:
        trade-proposed-in:
          connector: smallrye-in-memory
        # Phase 3 S4 — same Kafka-absent dev story as trade-proposed-in.
        bars-2m:
          connector: smallrye-in-memory
        indicators-2m:
          connector: smallrye-in-memory
      # Same Phase 3 reason as the incoming swap above — dev cluster has no
      # Kafka. The publisher itself is gated with @UnlessBuildProfile("prod")
      # so it never reaches the channel in %prod, but the channel must still
      # be configured (Quarkus validates outgoing channel wiring at build).
      outgoing:
        trade-filled-out:
          connector: smallrye-in-memory

# Test profile — Quarkus dev-services would otherwise try to spin up Mongo,
# MS SQL, and Kafka containers in CI. Disable them here so unit tests run
# without Docker. The trade-proposed-in incoming channel switches to in-memory
# so @QuarkusTest doesn't try to bootstrap a Kafka client; @Incoming wiring
# still validates at build-time. Scheduler is off so the (currently-empty)
# S6 EOD-flatten cron does not flap test wall-clock.
"%test":
  quarkus:
    scheduler:
      enabled: false
    # Random free HTTP test port — Quarkus' default 8081 collides when Gradle
    # runs multiple @QuarkusTest modules in parallel JVMs (see fix/test-port-collision).
    http:
      test-port: 0
    datasource:
      devservices:
        enabled: false
    kafka:
      devservices:
        enabled: false
  mp:
    messaging:
      incoming:
        trade-proposed-in:
          connector: smallrye-in-memory
        # Phase 3 S4 — @QuarkusTest profile swap so SmokeTest validates the
        # @Incoming wiring without bootstrapping a Kafka client.
        bars-2m:
          connector: smallrye-in-memory
        indicators-2m:
          connector: smallrye-in-memory
      # Outgoing trade-filled-out swaps to in-memory so @QuarkusTest doesn't
      # bootstrap a Kafka producer. Channel wiring still validates at build
      # time — the publisher is constructible by ARC, just emits to the
      # in-memory bus.
      outgoing:
        trade-filled-out:
          connector: smallrye-in-memory
