quarkus:
  application:
    name: ai-agent-service
  http:
    port: 8084
  log:
    level: INFO
    category:
      "com.levelsweep":
        level: INFO
    console:
      json:
        ~: true
        additional-field:
          "tenant_id":
            value: "${TENANT_ID:OWNER}"
            type: "string"
          "service":
            value: "ai-agent-service"
            type: "string"
  opentelemetry:
    enabled: true
    tracer:
      exporter:
        otlp:
          endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}"
  micrometer:
    export:
      prometheus:
        enabled: true
        path: /q/metrics
  mongodb:
    connection-string: "${MONGO_URL:mongodb://localhost:27017}"
    database: "${MONGO_DB:level_sweep}"

kafka:
  bootstrap:
    servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"

# Phase 4 S2 Trade Narrator — consumes tenant.fills published by execution-service
# (architecture-spec §12.1). The typed value-deserializer is the canonical
# Quarkus recipe (see services/execution-service for the mirror pattern).
mp:
  messaging:
    incoming:
      trade-fills-in:
        connector: smallrye-kafka
        topic: tenant.fills
        group.id: ai-agent-service
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.aiagent.narrator.TradeFilledDeserializer

anthropic:
  # Anthropic Messages API base URL — overridable for local stubs / a future
  # regional endpoint. Per ADR-0006 the SDK is hand-rolled JDK HttpClient over
  # POST /v1/messages — never a third-party SDK that pins this URL internally.
  base-url: "${ANTHROPIC_BASE_URL:https://api.anthropic.com}"
  api-key: "${ANTHROPIC_API_KEY:}"
  models:
    sentinel: "claude-haiku-4-5"
    narrator: "claude-sonnet-4-6"
    assistant: "claude-sonnet-4-6"
    reviewer: "claude-opus-4-7"
  cost-cap-usd-per-tenant-per-day:
    # Sentinel cap per ADR-0007 §6 — Haiku 4.5 is the cheapest tier so $0.50
    # absorbs ~5,000 calls/day at typical token sizes (well above the expected
    # ≤ 5 trades/day per tenant).
    sentinel: 0.50
    narrator: 1.00
    assistant: 5.00
    reviewer: 2.00
  enable-prompt-caching: true

# Mongo collection names for the AI audit log (architecture-spec §4.10 +
# ADR-0006). `ai_calls` is the per-call summary; `ai_prompts` is the cold
# blob keyed by SHA-256 prompt hash; `daily_cost` is the per-call cost row
# that DailyCostTracker rebuilds from on JVM restart.
audit:
  ai-calls-collection: "ai_calls"
  ai-prompts-collection: "ai_prompts"
  daily-cost-collection: "daily_cost"

# Phase 4 S2 Trade Narrator — Mongo collection for the per-event narratives
# surfaced on the trader dashboard + journal (architecture-spec §4.3.2 +
# §13.2 row "journal.narratives"). Indexed by (tenant_id, trade_id,
# generated_at desc) for the journal query path.
narrator:
  trade-narratives-collection: "trade_narratives"

# Phase 4 S3 Daily Reviewer — Mongo collection for the EOD session reports
# surfaced on the trader dashboard (architecture-spec §4.3.4 + §13.2 row
# "journal.daily_reports"). Indexed by (tenant_id, session_date desc) for
# the dashboard "last N reports for tenant" query.
#
# signal-history-collection: reserved for the Phase 5/6 producer (decision-
# engine). Phase 4's SessionJournalAggregator queries it best-effort and
# treats an empty result as "not wired yet".
reviewer:
  daily-reports-collection: "daily_reports"
  signal-history-collection: "signal_history"

# Phase 5 S6 Conversational Assistant (architecture-spec §4.5 + ADR-0006).
# Mongo collection holds per-(tenant, conversation) threads. Indexed by
# (tenant_id, conversation_id) unique for primary lookup and (tenant_id,
# updated_at desc) for the "recent conversations" listing.
#
# context.max-turns:        truncate older turns past N for the API context
#                            window. The Assistant's typical operator question
#                            references the last few turns; older history
#                            lands in the "[earlier turns truncated]" preamble.
# system-prompt-version:    audit-traceable version tag. Bump when the
#                            system prompt copy changes so prompt-hash
#                            equivalence is auditable per-version.
assistant:
  conversations-collection: "assistant_conversations"
  context:
    max-turns: 20
  system-prompt-version: v1

levelsweep:
  tenant:
    bootstrap-id: OWNER
  log:
    mdc-keys:
      - tenant_id
      - trace_id
      - ai_role
      - signal_id

# Test profile — Quarkus dev-services would otherwise try to spin up Mongo
# (and any other auto-discovered backend) in CI. Disable so unit tests run
# without Docker. Anthropic api-key blanked so AnthropicClient does not try to
# call out from a unit test that accidentally constructs the bean directly.
"%test":
  quarkus:
    mongodb:
      devservices:
        enabled: false
    kafka:
      devservices:
        enabled: false
    # Random free HTTP test port — Quarkus' default 8081 collides when Gradle
    # runs multiple @QuarkusTest modules in parallel JVMs.
    http:
      test-port: 0
    # Phase 4 S3 Daily Reviewer — disable the cron in @QuarkusTest so unit
    # tests drive runOnce() directly without the Quartz harness firing on
    # the wall clock.
    scheduler:
      enabled: false
  anthropic:
    api-key: ""
  # Phase 4 S2 — @QuarkusTest profile swap so SmokeTest validates the
  # @Incoming wiring without bootstrapping a Kafka client.
  mp:
    messaging:
      incoming:
        trade-fills-in:
          connector: smallrye-in-memory

# Production profile — Phase 4 dev cluster has no Kafka (Strimzi lands in
# Phase 6 per architecture-spec §12), so the trade-fills-in incoming channel
# swaps to the in-memory connector. The @Incoming-annotated listener still
# wires up — it just receives events from the in-memory bus instead of Kafka.
# Same pattern as execution-service / decision-engine.
"%prod":
  quarkus:
    opentelemetry:
      enabled: false
  mp:
    messaging:
      incoming:
        trade-fills-in:
          connector: smallrye-in-memory
