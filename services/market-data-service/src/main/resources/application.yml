quarkus:
  application:
    name: market-data-service
  http:
    port: 8081
  log:
    level: INFO
    category:
      "com.levelsweep":
        level: INFO
    console:
      json:
        ~: true
        # MDC keys mandatory per architecture-spec §18.3 + multi-tenant-readiness skill.
        # tenant_id and trace_id MUST appear on every log line.
        additional-field:
          "tenant_id":
            value: "${TENANT_ID:OWNER}"
            type: "string"
          "service":
            value: "market-data-service"
            type: "string"
  opentelemetry:
    enabled: true
    tracer:
      exporter:
        otlp:
          endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}"
  micrometer:
    export:
      prometheus:
        enabled: true
        path: /q/metrics
  # SmallRye Health — liveness/readiness endpoints exposed to AKS probes.
  # Default root-path is already /q/health; declared explicitly so future
  # operators see it documented (architecture-spec §17.4 + §21.1).
  smallrye-health:
    root-path: /q/health

  # MS SQL datasource (architecture-spec §13.1). Health is disabled so a
  # transient DB outage does not flap liveness — readiness already covers the
  # FSM-driven service health story. Flyway migrates at start to create the
  # daily_state table on a fresh DB.
  datasource:
    db-kind: mssql
    username: "${MSSQL_USER:sa}"
    password: "${MSSQL_PASSWORD:LevelSweep!2026}"
    jdbc:
      url: "${MSSQL_URL:jdbc:sqlserver://localhost:1433;databaseName=level_sweep;encrypt=false}"
    health:
      enabled: false
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration

  # MongoDB driver (architecture-spec §13.2). Health disabled for the same
  # reason as the SQL datasource — readiness is FSM-driven; outages downgrade
  # gracefully rather than flapping the liveness probe.
  mongodb:
    connection-string: "${MONGO_URL:mongodb://localhost:27017}"
    health:
      enabled: false

# Kafka topics consumed/produced — see architecture-spec §12.1
kafka:
  bootstrap:
    servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"

mp:
  messaging:
    # Placeholders. Phase 1 wires actual channels.
    incoming: { }
    outgoing: { }

# Per-tenant + per-trace MDC keys (logback-style placeholder; honored by quarkus json)
# `levelsweep.mongo.database` is read by MongoBarRepository via @ConfigProperty.
levelsweep:
  tenant:
    bootstrap-id: OWNER
  log:
    mdc-keys:
      - tenant_id
      - trace_id
  mongo:
    database: "${MONGO_DB:level_sweep}"

# Alpaca market-data adapter — see com.levelsweep.marketdata.alpaca.AlpacaConfig.
# api-key / secret-key MUST be supplied via env (Azure Key Vault → secrets in non-dev).
# Blank api-key is the dev/replay default; LivePipeline logs a WARN and skips WS connect.
alpaca:
  feed: "${ALPACA_FEED:sip}"
  api-key: "${ALPACA_API_KEY:}"
  secret-key: "${ALPACA_SECRET_KEY:}"
  symbols: "${ALPACA_SYMBOLS:SPY}"
  ring-buffer-capacity: 300000

tenant:
  id: "${TENANT_ID:OWNER}"

# Test profile — Quarkus dev-services would otherwise try to spin up Mongo
# and MS SQL containers in CI. Disable them here so unit tests run without
# Docker. Flyway is also turned off because there is no datasource to
# migrate against during plain unit tests.
"%test":
  quarkus:
    flyway:
      enabled: false
    datasource:
      devservices:
        enabled: false
    mongodb:
      devservices:
        enabled: false
