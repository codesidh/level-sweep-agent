quarkus:
  application:
    name: market-data-service
  http:
    port: 8081
  log:
    level: INFO
    category:
      "com.levelsweep":
        level: INFO
    console:
      json:
        ~: true
        # MDC keys mandatory per architecture-spec §18.3 + multi-tenant-readiness skill.
        # tenant_id and trace_id MUST appear on every log line.
        additional-field:
          "tenant_id":
            value: "${TENANT_ID:OWNER}"
            type: "string"
          "service":
            value: "market-data-service"
            type: "string"
  opentelemetry:
    enabled: true
    tracer:
      exporter:
        otlp:
          endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}"
  micrometer:
    export:
      prometheus:
        enabled: true
        path: /q/metrics
  # SmallRye Health — liveness/readiness endpoints exposed to AKS probes.
  # Default root-path is already /q/health; declared explicitly so future
  # operators see it documented (architecture-spec §17.4 + §21.1).
  smallrye-health:
    root-path: /q/health

  # Cron scheduler — fires SessionLevelScheduler at 09:29:30 ET each day.
  # Disabled under the %test profile below so unit tests don't trigger the cron.
  scheduler:
    enabled: true

  # MS SQL datasource (architecture-spec §13.1). Health is disabled so a
  # transient DB outage does not flap liveness — readiness already covers the
  # FSM-driven service health story. Flyway migrates at start to create the
  # daily_state table on a fresh DB.
  datasource:
    db-kind: mssql
    username: "${MSSQL_USER:sa}"
    password: "${MSSQL_PASSWORD:LevelSweep!2026}"
    jdbc:
      url: "${MSSQL_URL:jdbc:sqlserver://localhost:1433;databaseName=level_sweep;encrypt=false}"
    health:
      enabled: false
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration

  # MongoDB driver (architecture-spec §13.2). Health disabled for the same
  # reason as the SQL datasource — readiness is FSM-driven; outages downgrade
  # gracefully rather than flapping the liveness probe.
  mongodb:
    connection-string: "${MONGO_URL:mongodb://localhost:27017}"
    health:
      enabled: false

# Kafka topics consumed/produced — see architecture-spec §12.1
kafka:
  bootstrap:
    servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"

mp:
  messaging:
    incoming: { }
    # Outgoing bar topics — architecture-spec §12.1. Key is the symbol (StringSerializer),
    # value is the Bar / IndicatorSnapshot record serialized to JSON via Quarkus'
    # ObjectMapperSerializer (Jackson). Levels are NOT published — Decision Engine reads
    # them from MS SQL daily_state directly in Phase 2.
    outgoing:
      bars-1m:
        connector: smallrye-kafka
        topic: market.bars.1m
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
      bars-2m:
        connector: smallrye-kafka
        topic: market.bars.2m
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
      bars-15m:
        connector: smallrye-kafka
        topic: market.bars.15m
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
      bars-daily:
        connector: smallrye-kafka
        topic: market.bars.daily
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
      # Indicator snapshot topic — architecture-spec §12.1. Decision Engine subscribes
      # to populate IndicatorSnapshotHolder so SignalEvaluator can score live bars; Phase 3
      # S4-S5 (Stop Watcher / Trail Manager) also consume for §9 trigger evaluation.
      indicators-2m:
        connector: smallrye-kafka
        topic: market.indicators.2m
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer

# Per-tenant + per-trace MDC keys (logback-style placeholder; honored by quarkus json)
# `levelsweep.mongo.database` is read by MongoBarRepository via @ConfigProperty.
levelsweep:
  tenant:
    bootstrap-id: OWNER
  log:
    mdc-keys:
      - tenant_id
      - trace_id
  mongo:
    database: "${MONGO_DB:level_sweep}"

# Alpaca market-data adapter — see com.levelsweep.marketdata.alpaca.AlpacaConfig.
# api-key / secret-key MUST be supplied via env (Azure Key Vault → secrets in non-dev).
# Blank api-key is the dev/replay default; LivePipeline logs a WARN and skips WS connect.
alpaca:
  feed: "${ALPACA_FEED:sip}"
  api-key: "${ALPACA_API_KEY:}"
  secret-key: "${ALPACA_SECRET_KEY:}"
  symbols: "${ALPACA_SYMBOLS:SPY}"
  ring-buffer-capacity: 300000

tenant:
  id: "${TENANT_ID:OWNER}"

# Production profile — when the App Insights Java agent is attached
# (-javaagent at runtime), it owns the full OTel pipeline (traces + metrics +
# logs) and auto-instruments JDBC / Mongo / Kafka / SLF4J. Disabling Quarkus'
# own OTel here prevents (a) double-emit, (b) SDK-lifecycle races on shutdown,
# and (c) confused trace IDs when both pipes register exporters.
# Micrometer stays enabled so JVM metrics still publish to /q/metrics; the
# agent picks them up via the Micrometer-bridge it ships with.
#
# Flyway is also turned off in %prod because Phase 1 dev doesn't deploy
# MS SQL — managed Azure SQL Database lands in Phase 7 per architecture-spec
# §13.1. Without this, migrate-at-start would block boot trying to reach a
# nonexistent jdbc URL. The daily SessionLevelScheduler already catches
# LevelsRepository upsert exceptions, so an absent DB is graceful.
"%prod":
  quarkus:
    opentelemetry:
      enabled: false
    flyway:
      migrate-at-start: false
      enabled: false
    datasource:
      health:
        enabled: false
    mongodb:
      health:
        enabled: false
  # Phase 1 dev does not run Kafka — Strimzi cluster lands in Phase 6 per
  # architecture-spec §12. Until then, the bar emitter routes to in-memory
  # channels so producer construction doesn't fail at boot. Bars then go
  # nowhere in dev, which is correct: the Phase 2 Decision Engine consumer
  # doesn't exist yet, so the messaging path is dormant by design.
  mp:
    messaging:
      outgoing:
        bars-1m:
          connector: smallrye-in-memory
        bars-2m:
          connector: smallrye-in-memory
        bars-15m:
          connector: smallrye-in-memory
        bars-daily:
          connector: smallrye-in-memory
        indicators-2m:
          connector: smallrye-in-memory

# Test profile — Quarkus dev-services would otherwise try to spin up Mongo
# and MS SQL containers in CI. Disable them here so unit tests run without
# Docker. Flyway is also turned off because there is no datasource to
# migrate against during plain unit tests.
"%test":
  quarkus:
    # Random free HTTP test port — Quarkus' default 8081 collides when Gradle
    # runs multiple @QuarkusTest modules in parallel JVMs (see fix/test-port-collision).
    http:
      test-port: 0
    flyway:
      enabled: false
    datasource:
      devservices:
        enabled: false
    mongodb:
      devservices:
        enabled: false
    kafka:
      devservices:
        enabled: false
    # Disable the daily-levels cron under tests so the scheduler doesn't fire
    # at unpredictable wall-clock times during a CI run.
    scheduler:
      enabled: false
  # Swap Kafka for the in-memory connector under %test so unit tests don't
  # try to reach a broker. The topic + serializer keys are dropped because
  # the in-memory connector ignores them.
  mp:
    messaging:
      outgoing:
        bars-1m:
          connector: smallrye-in-memory
        bars-2m:
          connector: smallrye-in-memory
        bars-15m:
          connector: smallrye-in-memory
        bars-daily:
          connector: smallrye-in-memory
        indicators-2m:
          connector: smallrye-in-memory
