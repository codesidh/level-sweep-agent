quarkus:
  application:
    name: decision-engine
  http:
    port: 8082
  log:
    level: INFO
    category:
      "com.levelsweep":
        level: INFO
    console:
      json:
        ~: true
        # MDC keys mandatory per architecture-spec §18.3 + multi-tenant-readiness skill.
        # tenant_id and trace_id MUST appear on every log line.
        additional-field:
          "tenant_id":
            value: "${TENANT_ID:OWNER}"
            type: "string"
          "service":
            value: "decision-engine"
            type: "string"
  opentelemetry:
    enabled: true
    tracer:
      exporter:
        otlp:
          endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}"
  micrometer:
    export:
      prometheus:
        enabled: true
        path: /q/metrics
  # SmallRye Health — liveness/readiness endpoints exposed to AKS probes
  # (architecture-spec §17.4 / §21.1). Default root-path is already /q/health;
  # declared explicitly so future operators see it documented.
  smallrye-health:
    root-path: /q/health

  # MS SQL datasource (architecture-spec §13.1). Phase 2 Step 3 introduces
  # risk_events + trades tables and extends daily_state with the Risk FSM
  # columns. Health is disabled so a transient DB outage does not flap
  # liveness — readiness is FSM-driven.
  datasource:
    db-kind: mssql
    username: "${MSSQL_USER:sa}"
    password: "${MSSQL_PASSWORD:LevelSweep!2026}"
    jdbc:
      url: "${MSSQL_URL:jdbc:sqlserver://localhost:1433;databaseName=level_sweep;encrypt=false}"
    health:
      enabled: false
  # Decision-engine Flyway scripts live under db/migration/ with V100+ prefixes
  # so they don't collide with market-data-service's V001+ on a shared MS SQL
  # database (Flyway tracks the union in flyway_schema_history). Disabled in
  # %prod because Phase 2 dev does not deploy MS SQL — Azure SQL lands in
  # Phase 7 per architecture-spec §13.1.
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration

  # MongoDB driver (architecture-spec §13.2). Decision Engine reads bar history
  # in Phase 2 Step 2+; in Step 1 we only consume the live bar topic. Health
  # disabled — readiness is FSM-driven (will be wired in Step 3+).
  mongodb:
    connection-string: "${MONGO_URL:mongodb://localhost:27017}"
    health:
      enabled: false

# Kafka topics consumed — see architecture-spec §12.1. Decision Engine joins
# consumer group `decision-engine` and reads the four bar streams produced by
# market-data-service. Auto-offset-reset is `latest` so a restart does not
# re-process 30 days of historic bars (signal logic, FSMs, and persistence
# would all double-fire). Replay parity for backfill flows through the
# Replay Harness in Phase 2 Step 7, not through Kafka.
kafka:
  bootstrap:
    servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"

mp:
  messaging:
    incoming:
      # Each channel binds to one Kafka topic. The value deserializer is the
      # typed BarDeserializer subclass (extends ObjectMapperDeserializer<Bar>);
      # this is the canonical Quarkus recipe for Jackson-based deserialization
      # because Kafka discards type info on the wire and a plain
      # ObjectMapperDeserializer wouldn't know what to instantiate. See:
      # https://quarkus.io/guides/kafka#kafka-serialization
      bars-1m:
        connector: smallrye-kafka
        topic: market.bars.1m
        group.id: decision-engine
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.decision.ingest.BarDeserializer
      bars-2m:
        connector: smallrye-kafka
        topic: market.bars.2m
        group.id: decision-engine
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.decision.ingest.BarDeserializer
      bars-15m:
        connector: smallrye-kafka
        topic: market.bars.15m
        group.id: decision-engine
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.decision.ingest.BarDeserializer
      bars-daily:
        connector: smallrye-kafka
        topic: market.bars.daily
        group.id: decision-engine
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.decision.ingest.BarDeserializer
      # Indicator snapshot topic — architecture-spec §12.1. Populates
      # IndicatorSnapshotHolder so SignalEvaluator can score live bars instead
      # of skipping them with reason "no_indicators". Phase 3 S4-S5 (Stop Watcher /
      # Trail Manager) also subscribe for §9 trigger evaluation.
      indicators-2m:
        connector: smallrye-kafka
        topic: market.indicators.2m
        group.id: decision-engine
        auto.offset.reset: latest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: com.levelsweep.decision.ingest.IndicatorSnapshotDeserializer
    outgoing:
      # Trade Saga → Kafka bridge. The saga fires CDI Event<TradeProposed>;
      # TradeProposedKafkaPublisher (an @Observes adapter) relays each event
      # onto this channel as a Record keyed by tenantId. Topic per
      # architecture-spec §12.1 row 5 (`tenant.commands`). The execution
      # service in Phase 3 consumes this topic to drive Alpaca order placement.
      # The untyped ObjectMapperSerializer is fine here — Jackson knows the
      # value type at runtime; the consumer side pins the type via a typed
      # ObjectMapperDeserializer subclass.
      trade-proposed-out:
        connector: smallrye-kafka
        topic: tenant.commands
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# Per-tenant + per-trace MDC keys. `tenant.id` is read by the startup banner
# and by future signal/risk components via @ConfigProperty.
levelsweep:
  tenant:
    bootstrap-id: OWNER
  log:
    mdc-keys:
      - tenant_id
      - trace_id
      - signal_id
      - trade_id
  feature-flags:
    # Phase B flags — see docs/feature-flags.md. ALL OFF.
    phase-b-multi-tenant-onboarding: false
    phase-b-alpaca-oauth: false
  risk:
    # Risk FSM thresholds (requirements.md §11). Read by RiskFsmFactory.
    # max-trades-per-day caps operator-discipline halts (§16); budget-low-fraction
    # is the warn threshold expressed as a fraction of dailyLossBudget.
    max-trades-per-day: 5
    budget-low-fraction: "0.70"
  # Phase 5 S5 — Pre-Trade Sentinel veto wire (ADR-0007). The flag is OFF
  # by default; flipping it on requires the Phase 4 soak (5+ RTH sessions on
  # real Anthropic) to clear, per ADR-0007 §7. The remote ai-agent-service
  # also reads `levelsweep.sentinel.enabled` — defense in depth.
  sentinel:
    enabled: false
    # Hard wall-clock ceiling on the saga thread (ADR-0007 §4). The remote
    # already enforces 750ms against Anthropic; this layer adds belt-and-
    # braces protection against REST-hop stalls (DNS, TLS handshake,
    # connection-pool exhaustion).
    timeout-ms: 750
    # Defensive defaults for fields the decision-engine doesn't yet compute
    # (rsi2, regime, vix-close-prev). The Sentinel prompt absorbs zero/UNKNOWN
    # without producing spurious vetoes — see SentinelPromptBuilder tests.
    vix-close-prev-default: "0"
    regime-default: "UNKNOWN"
  ai-agent:
    # In-cluster URL for the ai-agent-service Pre-Trade Sentinel REST
    # endpoint. AKS namespace `ai-agent`, default port 8084.
    url: "${LEVELSWEEP_AI_AGENT_URL:http://ai-agent-service.ai-agent:8084}"

tenant:
  id: "${TENANT_ID:OWNER}"

# Production profile — when the App Insights Java agent is attached
# (-javaagent at runtime), it owns the full OTel pipeline (traces + metrics +
# logs) and auto-instruments JDBC / Mongo / Kafka / SLF4J. Disabling Quarkus'
# own OTel here prevents (a) double-emit, (b) SDK-lifecycle races on shutdown,
# and (c) confused trace IDs when both pipes register exporters. Mirrors
# market-data-service's setup.
#
# The dev cluster has no Kafka in Phase 2 (Strimzi lands in Phase 6 per
# architecture-spec §12), so the four bars-* incoming channels swap to the
# in-memory connector. The @Incoming-annotated BarConsumer methods still wire
# up — they just receive events from the in-memory bus instead of Kafka.
# In dev nothing produces to the in-memory channels yet, so the consumer
# is dormant by design until Phase 2 Step 7 (Replay Harness) feeds it.
"%prod":
  quarkus:
    opentelemetry:
      enabled: false
    datasource:
      health:
        enabled: false
      # Defense in depth — Quarkus dev-services are dev-mode-only by design,
      # but explicitly disabling them under %prod prevents an embedded
      # Postgres / MS SQL / Mongo / Kafka container from ever launching in
      # the AKS pod (which has no docker daemon). Phase 7 deploy artifacts.
      devservices:
        enabled: false
    # Flyway off in %prod for the same reason as market-data-service — Phase 2
    # dev does not deploy MS SQL, so migrate-at-start would block boot trying
    # to reach a nonexistent jdbc URL. Repository writes already catch SQL
    # exceptions and log a WARN, so an absent DB is graceful in dev.
    flyway:
      migrate-at-start: false
      enabled: false
    mongodb:
      health:
        enabled: false
      devservices:
        enabled: false
    kafka:
      devservices:
        enabled: false
  mp:
    messaging:
      incoming:
        bars-1m:
          connector: smallrye-in-memory
        bars-2m:
          connector: smallrye-in-memory
        bars-15m:
          connector: smallrye-in-memory
        bars-daily:
          connector: smallrye-in-memory
        indicators-2m:
          connector: smallrye-in-memory
      outgoing:
        # Belt-and-braces: TradeProposedKafkaPublisher is @UnlessBuildProfile("prod")
        # so the bean (and the @Channel injection point) is absent in %prod, but
        # configuring the channel for the in-memory connector keeps the channel
        # graph valid for any future producer that drops the profile gate.
        # Phase 6 Strimzi rollout switches this back to smallrye-kafka.
        trade-proposed-out:
          connector: smallrye-in-memory

# Test profile — Quarkus dev-services would otherwise try to spin up Mongo,
# MS SQL, and Kafka containers in CI. Disable them here so unit tests run
# without Docker. The four bars-* incoming channels switch to in-memory so
# @QuarkusTest doesn't try to bootstrap a Kafka client; @Incoming wiring
# still validates at build-time. No scheduler exists yet — the entry is
# present so a future @Scheduled cron does not flap test wall-clock.
"%test":
  quarkus:
    scheduler:
      enabled: false
    # Random free HTTP test port — Quarkus' default 8081 collides when Gradle
    # runs multiple @QuarkusTest modules in parallel JVMs (see fix/test-port-collision).
    http:
      test-port: 0
    flyway:
      enabled: false
    datasource:
      devservices:
        enabled: false
    mongodb:
      devservices:
        enabled: false
    kafka:
      devservices:
        enabled: false
  mp:
    messaging:
      incoming:
        bars-1m:
          connector: smallrye-in-memory
        bars-2m:
          connector: smallrye-in-memory
        bars-15m:
          connector: smallrye-in-memory
        bars-daily:
          connector: smallrye-in-memory
        indicators-2m:
          connector: smallrye-in-memory
      outgoing:
        # @QuarkusTest swap so the saga's TradeProposedKafkaPublisher injects a
        # channel that resolves without bootstrapping a Kafka client.
        trade-proposed-out:
          connector: smallrye-in-memory
