# =============================================================================
# FOMC Schedule, 2026 - 2030.
#
# Source: federalreserve.gov/monetarypolicy/fomccalendars.htm. The FOMC
# publishes a 2-year-forward calendar; 2026 is firm. 2027-2030 are projected
# from the FOMC's standard 8-meetings-per-year cadence (late Jan, mid Mar,
# late Apr / early May, mid Jun, late Jul, mid Sep, early Nov, mid Dec). When
# the Federal Reserve publishes firm 2027+ dates, this file is the single
# place to update — operators sync it via PR, no API call.
#
# WHY HARD-CODED: same rationale as the NYSE holiday file. The schedule is
# announced 12-24 months in advance, releases are at scheduled times (statement
# 14:00 ET, presser 14:30 ET on day-2 of two-day meetings), and missing one
# would surface as a known-issue alert long before it affected trading.
#
# Convention: only the SECOND day of a two-day meeting is recorded as
# {@code FOMC_MEETING} (that's the day the statement releases and Powell
# speaks; the first day has no public release and is irrelevant for the
# Session FSM blackout window).
#
# Minutes are released ~3 weeks (Wednesday) after each meeting. The exact
# release date is published with the meeting minutes; until that's confirmed
# we use the standard +21-day Wednesday rule, hand-verified against the 2026
# FOMC calendar.
#
# Schema:
#   meetings:        list of { date, name }            FOMC statement day
#   minutes:         list of { date, name }            FOMC minutes release
# =============================================================================

