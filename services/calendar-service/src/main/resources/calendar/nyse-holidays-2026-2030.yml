earlyCloses:
  # ---- 2026 ----
  # No July half-day in 2026 (July 3 is the observed Independence Day full
  # closure; July 4 is Saturday).
  - { date: "2026-11-27", name: "Day after Thanksgiving" }
  - { date: "2026-12-24", name: "Christmas Eve" }

  # ---- 2027 ----
  # No July half-day (July 3 is Saturday, July 4 is Sunday, observed July 5).
  - { date: "2027-11-26", name: "Day after Thanksgiving" }
  # No Christmas Eve half-day (Dec 24 is the observed Christmas full closure).

  # ---- 2028 ----
  - { date: "2028-07-03", name: "Day before Independence Day" }
  - { date: "2028-11-24", name: "Day after Thanksgiving" }
  # No Christmas Eve half-day (Dec 24 is Sunday).

  # ---- 2029 ----
  - { date: "2029-07-03", name: "Day before Independence Day" }
  - { date: "2029-11-23", name: "Day after Thanksgiving" }
  - { date: "2029-12-24", name: "Christmas Eve" }

